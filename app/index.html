<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iall Club</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --bg3: #141428;
    --card: #1a1a2e;
    --border: #2a2a4a;
    --cyan: #00d4ff;
    --purple: #8b5cf6;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --grad: linear-gradient(135deg, #00d4ff, #8b5cf6);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }

  /* LOGIN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 50%, #1a0a2e 0%, #0a0a0f 70%);
  }
  .login-box {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:40px; width:380px; text-align:center;
  }
  .login-logo { font-size:28px; font-weight:900; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
  .login-sub { color:var(--text2); font-size:13px; margin-bottom:32px; }
  .login-box input {
    width:100%; padding:12px 16px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:14px; margin-bottom:12px; outline:none;
    transition:.2s;
  }
  .login-box input:focus { border-color:var(--cyan); }
  .btn-primary {
    width:100%; padding:12px; background:var(--grad); border:none; border-radius:8px;
    color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:.2s;
  }
  .btn-primary:hover { opacity:.85; }
  .login-err { color:var(--red); font-size:13px; margin-top:10px; min-height:20px; }

  /* MAIN APP */
  #app { display:none; min-height:100vh; }
  .topbar {
    background:var(--bg2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:56px; position:sticky; top:0; z-index:100;
  }
  .topbar-logo { font-size:18px; font-weight:900; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .topbar-user { font-size:13px; color:var(--text2); }
  .btn-sm {
    padding:6px 14px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--text2); font-size:12px; cursor:pointer; transition:.2s;
  }
  .btn-sm:hover { border-color:var(--cyan); color:var(--cyan); }

  .main-layout { display:flex; min-height:calc(100vh - 56px); }
  .sidebar {
    width:220px; background:var(--bg2); border-right:1px solid var(--border);
    padding:20px 12px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:56px; height:calc(100vh - 56px); overflow-y:auto;
  }
  .sidebar-title { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; padding:8px 12px 4px; }
  .nav-item {
    padding:10px 12px; border-radius:8px; cursor:pointer; transition:.2s;
    font-size:13px; color:var(--text2); display:flex; align-items:center; gap:10px;
    border:1px solid transparent;
  }
  .nav-item:hover { background:var(--bg3); color:var(--text); }
  .nav-item.active { background:var(--bg3); color:var(--cyan); border-color:var(--border); }
  .nav-item .icon { font-size:16px; width:20px; text-align:center; }

  .content { flex:1; padding:28px; overflow-y:auto; }

  /* CARDS */
  .page-title { font-size:22px; font-weight:700; margin-bottom:4px; }
  .page-sub { color:var(--text2); font-size:13px; margin-bottom:24px; }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .kpi-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px;
    transition:.2s;
  }
  .kpi-card:hover { border-color:var(--border); transform:translateY(-2px); }
  .kpi-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .kpi-value { font-size:28px; font-weight:800; margin-top:4px; }
  .kpi-value.cyan { color:var(--cyan); }
  .kpi-value.purple { color:var(--purple); }
  .kpi-value.green { color:var(--green); }
  .kpi-value.red { color:var(--red); }
  .kpi-value.yellow { color:var(--yellow); }

  /* TABLES */
  .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .table-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .table-header h3 { font-size:15px; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th { padding:12px 16px; text-align:left; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
  td { padding:12px 16px; font-size:13px; border-bottom:1px solid rgba(255,255,255,.04); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }

  .badge {
    display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
  }
  .badge.green { background:rgba(16,185,129,.15); color:var(--green); }
  .badge.red { background:rgba(239,68,68,.15); color:var(--red); }
  .badge.yellow { background:rgba(245,158,11,.15); color:var(--yellow); }
  .badge.cyan { background:rgba(0,212,255,.15); color:var(--cyan); }
  .badge.purple { background:rgba(139,92,246,.15); color:var(--purple); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7);
    align-items:center; justify-content:center; z-index:1000; display:none;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto;
  }
  .modal h3 { font-size:17px; font-weight:700; margin-bottom:20px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:6px; }
  .form-group input, .form-group select {
    width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:13px; outline:none; transition:.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color:var(--cyan); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-cancel { flex:1; padding:10px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text2); cursor:pointer; transition:.2s; }
  .btn-cancel:hover { border-color:var(--red); color:var(--red); }
  .btn-save { flex:2; padding:10px; background:var(--grad); border:none; border-radius:8px; color:#fff; font-weight:700; cursor:pointer; transition:.2s; }
  .btn-save:hover { opacity:.85; }
  .btn-save:disabled { opacity:.5; cursor:not-allowed; }

  /* MÓDULOS GRID */
  .modules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .module-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px;
    cursor:pointer; transition:.2s; text-align:center;
  }
  .module-card:hover { border-color:var(--cyan); transform:translateY(-2px); }
  .module-card.locked { opacity:.4; cursor:not-allowed; }
  .module-card.locked:hover { transform:none; border-color:var(--border); }
  .module-icon { font-size:36px; margin-bottom:12px; }
  .module-name { font-size:14px; font-weight:700; margin-bottom:4px; }
  .module-desc { font-size:11px; color:var(--text2); }

  /* MÓDULO ABIERTO */
  .module-back { display:flex; align-items:center; gap:8px; color:var(--cyan); cursor:pointer; font-size:13px; margin-bottom:20px; }
  .module-back:hover { opacity:.7; }

  /* SUSPENDIDO */
  .suspended-banner {
    background:rgba(239,68,68,.1); border:1px solid var(--red); border-radius:12px;
    padding:20px 24px; margin-bottom:24px; display:flex; align-items:center; gap:16px;
  }

  /* TABS */
  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--bg2); padding:4px; border-radius:10px; width:fit-content; }
  .tab { padding:8px 18px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text2); transition:.2s; }
  .tab.active { background:var(--card); color:var(--cyan); }

  .action-btn { padding:6px 12px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; transition:.2s; margin-right:4px; }
  .action-btn.edit { background:rgba(0,212,255,.1); color:var(--cyan); }
  .action-btn.del { background:rgba(239,68,68,.1); color:var(--red); }
  .action-btn.pay { background:rgba(16,185,129,.1); color:var(--green); }
  .action-btn:hover { opacity:.7; }

  .loading { text-align:center; padding:40px; color:var(--text2); font-size:14px; }
  .empty { text-align:center; padding:40px; color:var(--text2); font-size:13px; }

  .backup-btn {
    padding:10px 20px; background:rgba(139,92,246,.15); border:1px solid var(--purple);
    border-radius:8px; color:var(--purple); cursor:pointer; font-size:13px; font-weight:600;
    transition:.2s;
  }
  .backup-btn:hover { background:rgba(139,92,246,.25); }

  .modulos-check { display:flex; flex-wrap:wrap; gap:10px; }
  .mod-check { display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; padding:6px 10px; background:var(--bg3); border-radius:6px; border:1px solid var(--border); transition:.2s; }
  .mod-check:hover { border-color:var(--cyan); }
  .mod-check input { cursor:pointer; accent-color:var(--cyan); }

  #toast {
    position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:12px 20px; font-size:13px; z-index:9999;
    transform:translateY(100px); opacity:0; transition:.3s; min-width:200px; text-align:center;
  }
  #toast.show { transform:translateY(0); opacity:1; }
  #toast.success { border-color:var(--green); color:var(--green); }
  #toast.error { border-color:var(--red); color:var(--red); }

  /* SPINNER */
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">iall Club</div>
    <div class="login-sub">Intelligent Operational Systems</div>
    <input type="email" id="login-email" placeholder="Email" onkeydown="if(event.key==='Enter')doLogin()" />
    <input type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">iall Club</div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-body"></div>
</div>

<div id="toast"></div>

<script>
const SUPA_URL = 'https://smldkvlmmzlgpxrtfesz.supabase.co';
const SUPA_KEY = 'sb_publishable_HGeSd7TgEqn53VUrltY-Tg_OW_ERXQ8';

let STATE = { user: null, cliente: null, page: 'dashboard', moduleOpen: null, suspended: false };

// ── API helpers ──────────────────────────────────────────
async function api(path, method='GET', body=null) {
  try {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,
        'Prefer': 'return=representation'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.message || e.details || r.status);
    }
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  } catch(e) {
    console.error('API error:', e);
    throw e;
  }
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3500);
}

// ── LOGIN ────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('btn-login');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Completá todos los campos'; return; }

  btn.innerHTML = '<span class="spinner"></span>Ingresando...';
  btn.disabled = true;

  try {
    const users = await api(`usuarios?email=eq.${encodeURIComponent(email)}&select=*`);
    if (!users.length) { err.textContent = 'Usuario no encontrado'; return; }
    const u = users[0];

    let ok = false;
    if (u.password_hash) {
      ok = u.password_hash === pass ||
           (typeof dcodeIO !== 'undefined' && dcodeIO.bcrypt.compareSync(pass, u.password_hash));
    } else {
      ok = true;
      await api(`usuarios?id=eq.${u.id}`, 'PATCH', { password_hash: pass });
    }
    if (!ok) { err.textContent = 'Contraseña incorrecta'; return; }
    if (!u.activo) { err.textContent = 'Usuario desactivado. Contactá a iall Club.'; return; }

    STATE.user = u;

    if (u.rol === 'cliente') {
      const clientes = await api(`clientes?usuario_id=eq.${u.id}&select=*`);
      if (clientes.length) {
        STATE.cliente = clientes[0];
        STATE.suspended = await checkSuspension(clientes[0].id);
      }
    }

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topbar-user').textContent = u.nombre + ' · ' + u.rol;
    renderSidebar();
    renderPage('dashboard');
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
  } finally {
    btn.innerHTML = 'Ingresar';
    btn.disabled = false;
  }
}

async function checkSuspension(clienteId) {
  try {
    const pagos = await api(`pagos?cliente_id=eq.${clienteId}&pagado=eq.false&order=anio.desc,mes.desc&select=*`);
    return pagos.length >= 2;
  } catch { return false; }
}

function doLogout() {
  STATE = { user: null, cliente: null, page: 'dashboard', moduleOpen: null, suspended: false };
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
}

// ── SIDEBAR ──────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const isAdmin = ['superadmin','admin'].includes(STATE.user.rol);
  let html = '';
  if (isAdmin) {
    html += `<div class="sidebar-title">Administración</div>
    <div class="nav-item" onclick="renderPage('dashboard')"><span class="icon">📊</span>Dashboard</div>
    <div class="nav-item" onclick="renderPage('clientes')"><span class="icon">👥</span>Clientes</div>
    <div class="nav-item" onclick="renderPage('pagos')"><span class="icon">💳</span>Pagos</div>
    <div class="nav-item" onclick="renderPage('admins')"><span class="icon">🔐</span>Admins</div>
    <div class="nav-item" onclick="renderPage('backup')"><span class="icon">💾</span>Backup</div>`;
  } else {
    html += `<div class="sidebar-title">Menú</div>
    <div class="nav-item" onclick="renderPage('dashboard')"><span class="icon">🏠</span>Inicio</div>
    <div class="nav-item" onclick="renderPage('modulos')"><span class="icon">⚡</span>Mis Módulos</div>`;
  }
  sb.innerHTML = html;
}

function setActive(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(`'${page}'`))
      el.classList.add('active');
  });
}

// ── PAGES ────────────────────────────────────────────────
async function renderPage(page) {
  STATE.page = page;
  STATE.moduleOpen = null;
  setActive(page);
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading">⏳ Cargando...</div>';
  try {
    if (['superadmin','admin'].includes(STATE.user.rol)) {
      if (page === 'dashboard')  await renderAdminDashboard();
      else if (page === 'clientes') await renderClientes();
      else if (page === 'pagos')    await renderPagos();
      else if (page === 'admins')   await renderAdmins();
      else if (page === 'backup')   await renderBackup();
    } else {
      if (page === 'dashboard') await renderClienteDashboard();
      else if (page === 'modulos') await renderModulos();
    }
  } catch(e) {
    c.innerHTML = `<div class="empty">❌ Error cargando página: ${e.message}</div>`;
  }
}

// ── ADMIN DASHBOARD ──────────────────────────────────────
async function renderAdminDashboard() {
  const [clientes, pagos, modulos] = await Promise.all([
    api('clientes?select=*'),
    api('pagos?pagado=eq.false&select=*'),
    api('cliente_modulos?activo=eq.true&select=*')
  ]);
  let suspendidos = 0;
  for (const cl of clientes) {
    const p = await api(`pagos?cliente_id=eq.${cl.id}&pagado=eq.false&select=id`);
    if (p.length >= 2) suspendidos++;
  }
  document.getElementById('content').innerHTML = `
    <div class="page-title">Panel de Control</div>
    <div class="page-sub">Resumen general de iall Club</div>
    <div class="cards-grid">
      <div class="kpi-card"><div class="kpi-label">Clientes totales</div><div class="kpi-value cyan">${clientes.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Módulos activos</div><div class="kpi-value purple">${modulos.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Pagos pendientes</div><div class="kpi-value yellow">${pagos.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Suspendidos</div><div class="kpi-value red">${suspendidos}</div></div>
    </div>
    <p style="color:var(--text2);font-size:13px">Usá el menú lateral para gestionar clientes, pagos y administradores.</p>`;
}

// ── CLIENTES ─────────────────────────────────────────────
async function renderClientes() {
  const clientes = await api('clientes?select=*,usuarios(nombre,email,activo)');
  let rows = '';
  for (const cl of clientes) {
    const pagos = await api(`pagos?cliente_id=eq.${cl.id}&pagado=eq.false&select=id`);
    const susp = pagos.length >= 2;
    const u = cl.usuarios || {};
    rows += `<tr>
      <td>${u.nombre||'-'}</td>
      <td>${cl.empresa}</td>
      <td>${u.email||'-'}</td>
      <td><span class="badge ${susp?'red':'green'}">${susp?'Suspendido':'Activo'}</span></td>
      <td>
        <button class="action-btn edit" onclick="editCliente('${cl.id}')">Editar</button>
        <button class="action-btn edit" onclick="verModulos('${cl.id}','${cl.empresa}')">Módulos</button>
        <button class="action-btn del" onclick="delCliente('${cl.id}')">Eliminar</button>
      </td>
    </tr>`;
  }
  document.getElementById('content').innerHTML = `
    <div class="page-title">Clientes</div>
    <div class="page-sub">Gestión de clientes y módulos contratados</div>
    <div style="margin-bottom:16px">
      <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="newCliente()">+ Nuevo cliente</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Nombre</th><th>Empresa</th><th>Email</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" class="empty">Sin clientes aún</td></tr>'}</tbody></table>
    </div>`;
}

async function newCliente() {
  const mods = await api('modulos?activo=eq.true&select=*');
  showModal(`<h3>Nuevo Cliente</h3>
    <div class="form-group"><label>Nombre completo</label><input id="f-nombre" placeholder="Juan Pérez"/></div>
    <div class="form-group"><label>Email (será su usuario)</label><input id="f-email" type="email" placeholder="juan@empresa.com"/></div>
    <div class="form-group"><label>Contraseña inicial</label><input id="f-pass" placeholder="Contraseña"/></div>
    <div class="form-group"><label>Empresa</label><input id="f-empresa" placeholder="Empresa S.A."/></div>
    <div class="form-group"><label>Teléfono</label><input id="f-tel" placeholder="+54 261..."/></div>
    <div class="form-group"><label>Módulos contratados</label>
      <div class="modulos-check">${mods.map(m=>`<label class="mod-check"><input type="checkbox" value="${m.id}" data-nombre="${m.nombre}"/> ${m.nombre}</label>`).join('')}</div>
    </div>
    <div id="modal-err" style="color:var(--red);font-size:13px;min-height:18px;margin-top:8px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-guardar" onclick="saveNewCliente()">Guardar</button>
    </div>`);
}

async function saveNewCliente() {
  const nombre  = document.getElementById('f-nombre').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const pass    = document.getElementById('f-pass').value.trim();
  const empresa = document.getElementById('f-empresa').value.trim();
  const tel     = document.getElementById('f-tel').value.trim();
  const errEl   = document.getElementById('modal-err');
  const btn     = document.getElementById('btn-guardar');

  errEl.textContent = '';
  if (!nombre||!email||!pass||!empresa) {
    errEl.textContent = 'Completá todos los campos obligatorios';
    return;
  }

  btn.innerHTML = '<span class="spinner"></span>Guardando...';
  btn.disabled = true;

  try {
    // 1. Crear usuario
    const usuarios = await api('usuarios?select=*', 'POST', {
      email, nombre, rol: 'cliente', activo: true, password_hash: pass
    });
    const u = usuarios[0];
    if (!u || !u.id) throw new Error('No se pudo crear el usuario');

    // 2. Crear cliente
    const clientes = await api('clientes?select=*', 'POST', {
      usuario_id: u.id, empresa, contacto: nombre, telefono: tel
    });
    const cl = clientes[0];
    if (!cl || !cl.id) throw new Error('No se pudo crear el cliente');

    // 3. Asignar módulos
    const checks = document.querySelectorAll('.modulos-check input:checked');
    for (const ch of checks) {
      await api('cliente_modulos', 'POST', {
        cliente_id: cl.id, modulo_id: ch.value, activo: true
      });
    }

    // 4. Crear pago del mes actual
    const now = new Date();
    await api('pagos', 'POST', {
      cliente_id: cl.id,
      mes: now.getMonth() + 1,
      anio: now.getFullYear(),
      pagado: false
    });

    closeModal();
    toast('✅ Cliente creado exitosamente');
    renderPage('clientes');
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    btn.innerHTML = 'Guardar';
    btn.disabled = false;
  }
}

async function verModulos(clienteId, empresa) {
  const [todos, contratados] = await Promise.all([
    api('modulos?activo=eq.true&select=*'),
    api(`cliente_modulos?cliente_id=eq.${clienteId}&select=*`)
  ]);
  const contratadosIds = contratados.map(c => c.modulo_id);
  showModal(`<h3>Módulos — ${empresa}</h3>
    <div class="modulos-check" style="margin-bottom:8px">${todos.map(m=>`<label class="mod-check">
      <input type="checkbox" value="${m.id}" ${contratadosIds.includes(m.id)?'checked':''}/> ${m.nombre}
    </label>`).join('')}</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveModulos('${clienteId}')">Guardar</button>
    </div>`);
}

async function saveModulos(clienteId) {
  try {
    const checks = document.querySelectorAll('.modulos-check input');
    for (const ch of checks) {
      const exists = await api(`cliente_modulos?cliente_id=eq.${clienteId}&modulo_id=eq.${ch.value}&select=*`);
      if (ch.checked && !exists.length) {
        await api('cliente_modulos', 'POST', { cliente_id: clienteId, modulo_id: ch.value, activo: true });
      } else if (!ch.checked && exists.length) {
        await api(`cliente_modulos?id=eq.${exists[0].id}`, 'DELETE');
      }
    }
    closeModal();
    toast('✅ Módulos actualizados');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function delCliente(id) {
  if (!confirm('¿Eliminar este cliente? Se borrarán todos sus datos.')) return;
  try {
    const cl = await api(`clientes?id=eq.${id}&select=usuario_id`);
    await api(`cliente_modulos?cliente_id=eq.${id}`, 'DELETE');
    await api(`pagos?cliente_id=eq.${id}`, 'DELETE');
    await api(`clientes?id=eq.${id}`, 'DELETE');
    if (cl[0]) await api(`usuarios?id=eq.${cl[0].usuario_id}`, 'DELETE');
    toast('Cliente eliminado');
    renderPage('clientes');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function updateCliente(id, usuarioId) {

// ── PAGOS ────────────────────────────────────────────────
async function renderPagos() {
  const clientes = await api('clientes?select=*,usuarios(nombre,email)');
  let rows = '';
  for (const cl of clientes) {
    const pagos = await api(`pagos?cliente_id=eq.${cl.id}&order=anio.desc,mes.desc&select=*`);
    const pendientes = pagos.filter(p => !p.pagado).length;
    const susp = pendientes >= 2;
    for (const p of pagos.slice(0,3)) {
      rows += `<tr>
        <td>${cl.usuarios?.nombre||'-'}</td>
        <td>${cl.empresa}</td>
        <td>${p.mes}/${p.anio}</td>
        <td>${p.monto ? '$' + p.monto : '-'}</td>
        <td><span class="badge ${p.pagado?'green':'red'}">${p.pagado?'Pagado':'Pendiente'}</span></td>
        <td>${susp?'<span class="badge red">Suspendido</span>':''}</td>
        <td>${!p.pagado?`<button class="action-btn pay" onclick="marcarPagado('${p.id}')">✓ Pagado</button>`:''}</td>
      </tr>`;
    }
  }
  document.getElementById('content').innerHTML = `
    <div class="page-title">Pagos</div>
    <div class="page-sub">Control de pagos mensuales — suspensión automática a los 2 meses de deuda</div>
    <div style="margin-bottom:16px">
      <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="newPago()">+ Registrar pago</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Cliente</th><th>Empresa</th><th>Período</th><th>Monto</th><th>Estado</th><th>Suspensión</th><th>Acción</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" class="empty">Sin registros</td></tr>'}</tbody></table>
    </div>`;
}

    renderPage('pagos');
  } catch(e) { toast('Error: ' + e.message, 'error'); }

async function renderBackup() {
  document.getElementById('content').innerHTML = `
    <div class="page-title">Backup</div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
      <button class="backup-btn" onclick="doBackup('todo')">💾 Backup completo</button>
      <button class="backup-btn" onclick="doBackup('clientes')">👥 Solo clientes</button>
      <button class="backup-btn" onclick="doBackup('pagos')">💳 Solo pagos</button>
      <button class="backup-btn" onclick="doBackup('progreso')">📊 Solo progreso</button>
    </div>`;
}

async function doBackup(tipo) {
  try {
    let data = {};
    if (tipo === 'todo' || tipo === 'clientes') data.clientes = await api('clientes?select=*,usuarios(*)');
    if (tipo === 'todo' || tipo === 'pagos')    data.pagos    = await api('pagos?select=*');
    if (tipo === 'todo' || tipo === 'progreso') data.progreso = await api('progreso_modulo?select=*');
    if (tipo === 'todo') {
      data.usuarios = await api('usuarios?select=id,email,nombre,rol,activo,created_at');
      data.modulos  = await api('modulos?select=*');
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `iallclub_backup_${tipo}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast('✅ Backup descargado');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function renderModulos() {
  if (STATE.suspended) { renderClienteDashboard(); return; }
  const [contratados, todos] = await Promise.all([
    api(`cliente_modulos?cliente_id=eq.${STATE.cliente.id}&activo=eq.true&select=*`),
    api('modulos?activo=eq.true&select=*')
  ]);
  const contratadosIds = contratados.map(c => c.modulo_id);

  const cards = todos.map(m => {
    const locked = !contratadosIds.includes(m.id);
    return `<div class="module-card ${locked?'locked':''}" ${locked?'':'onclick="openModule(\''+m.nombre+'\')"'}>
      <div class="module-icon">${MODULE_ICONS[m.nombre]||'⚡'}</div>
      <div class="module-name">${m.nombre.charAt(0).toUpperCase()+m.nombre.slice(1)} App</div>
      <div class="module-desc">${locked?'🔒 No contratado':m.descripcion||'Clic para acceder'}</div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="page-title">Mis Módulos</div>
    <div class="page-sub">Hacé clic en un módulo para abrirlo</div>
    <div class="modules-grid">${cards}</div>`;
}

// ── MODAL ────────────────────────────────────────────────
function showModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
