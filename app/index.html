  const clienteId = STATE.cliente ? STATE.cliente.id : null;
  if (!clienteId) return;

  document.getElementById('content').innerHTML = `
    <div class="module-back" onclick="renderPage('modulos')" style="margin-bottom:12px">← Volver a módulos</div>
    <div class="temp-wrap">
      <div class="temp-header">
        <div class="temp-title">❄️ Control de Temperaturas</div>
        <div class="temp-actions">
          <button class="temp-btn primary" onclick="tempNuevoRegistro()">+ Registrar temperatura</button>
          <button class="temp-btn secondary" onclick="tempNuevaUnidad()">⚙️ Nueva unidad</button>
          <button class="temp-btn excel" onclick="tempExportarExcel()">⬇ Exportar Excel</button>
          <button class="temp-btn ai" onclick="tempAnalisisIA()">🤖 Análisis IA</button>
        </div>
      </div>

      <div class="temp-kpis" id="temp-kpis">
        <div class="temp-kpi"><div class="temp-kpi-label">Unidades</div><div class="temp-kpi-val cyan" id="tkpi-unidades">—</div></div>
        <div class="temp-kpi"><div class="temp-kpi-label">Registros hoy</div><div class="temp-kpi-val cyan" id="tkpi-hoy">—</div></div>
        <div class="temp-kpi"><div class="temp-kpi-label">Alertas hoy</div><div class="temp-kpi-val alert" id="tkpi-alertas">—</div></div>
        <div class="temp-kpi"><div class="temp-kpi-label">Total registros</div><div class="temp-kpi-val yellow" id="tkpi-total">—</div></div>
      </div>

      <div class="temp-tabs">
        <button class="temp-tab active" id="ttab-dashboard" onclick="tempSetTab('dashboard')">📊 Dashboard</button>
        <button class="temp-tab" id="ttab-registros" onclick="tempSetTab('registros')">📋 Registros</button>
      </div>

      <div id="temp-tab-content"></div>
    </div>

    <div class="temp-modal" id="temp-modal">
      <div class="temp-modal-box" id="temp-modal-body"></div>
    </div>`;

  await tempLoadData(clienteId);
}

async function tempLoadData(clienteId) {
  try {
    const hoy = new Date().toISOString().slice(0,10);
    const [unids, regs] = await Promise.all([
      api(`temp_unidades?cliente_id=eq.${clienteId}&activo=eq.true&order=nombre.asc&select=*`),
      api(`temp_registros?cliente_id=eq.${clienteId}&order=fecha.desc,hora.desc&limit=500&select=*`)
    ]);
    tempUnidades = unids;
    tempRegistros = regs;
    tempUpdateKPIs(hoy);
    tempRenderTab();
  } catch(e) { console.error('Error cargando temperaturas:', e); }
}

function tempUpdateKPIs(hoy) {
  const hoyStr = hoy || new Date().toISOString().slice(0,10);
  const regsHoy = tempRegistros.filter(r => r.fecha === hoyStr);
  const alertasHoy = regsHoy.filter(r => r.alerta);
  const ku = document.getElementById('tkpi-unidades');
  const kh = document.getElementById('tkpi-hoy');
  const ka = document.getElementById('tkpi-alertas');
  const kt = document.getElementById('tkpi-total');
  if(ku) ku.textContent = tempUnidades.length;
  if(kh) kh.textContent = regsHoy.length;
  if(ka) ka.textContent = alertasHoy.length;
  if(kt) kt.textContent = tempRegistros.length;
}

function tempSetTab(tab) {
  tempTab = tab;
  document.querySelectorAll('.temp-tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('ttab-' + tab);
  if(el) el.classList.add('active');
  tempRenderTab();
}

function tempRenderTab() {
  if(tempTab === 'dashboard') tempRenderDashboard();
  else if(tempTab === 'registros') tempRenderRegistros();
}

function tempRenderDashboard() {
  if (!tempUnidades.length) {
    document.getElementById('temp-tab-content').innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--text2)">
        <div style="font-size:48px;margin-bottom:16px">❄️</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">Sin unidades registradas</div>
        <div style="font-size:13px;margin-bottom:20px">Agregá tu primera unidad de frío para empezar</div>
        <button class="temp-btn primary" onclick="tempNuevaUnidad()">⚙️ Agregar unidad</button>
      </div>`;
    return;
  }

  const cards = tempUnidades.map(u => {
    const ultimo = tempRegistros.find(r => r.unidad_id === u.id);
    const lim = TEMP_LIMITES[u.tipo];
    const icon = lim ? lim.icon : '🌡️';
    const limLabel = lim ? lim.label : '—';

    let tempDisplay = '<span style="color:var(--text2);font-size:16px">Sin datos</span>';
    let badge = '<span class="temp-badge-nodata">Sin datos</span>';
    let cardClass = '';

    if (ultimo) {
      const esAlerta = tempEsAlerta(parseFloat(ultimo.temperatura), u.tipo);
      const color = esAlerta ? '#ef4444' : '#10b981';
      tempDisplay = `<span style="color:${color}">${ultimo.temperatura}</span><span class="unit">°C</span>`;
      badge = esAlerta
        ? '<span class="temp-badge-alert">⚠️ FUERA DE RANGO</span>'
        : '<span class="temp-badge-ok">✅ Normal</span>';
      if(esAlerta) cardClass = 'alerta';
    }

    return `<div class="temp-unidad-card ${cardClass}" onclick="tempVerUnidad('${u.id}')">
      <div class="temp-unidad-header">
        <span class="temp-unidad-icon">${icon}</span>
        <span class="temp-unidad-tipo">${TEMP_NOMBRES[u.tipo] || u.tipo}</span>
      </div>
      <div class="temp-unidad-nombre">${u.nombre}</div>
      <div class="temp-unidad-ubicacion">📍 ${u.ubicacion || 'Sin ubicación'}</div>
      <div class="temp-unidad-temp">${tempDisplay}</div>
      <div class="temp-unidad-footer">
        <span>Límite: ${limLabel}</span>
        ${badge}
      </div>
    </div>`;
  }).join('');

  document.getElementById('temp-tab-content').innerHTML = `
    <div class="temp-unidades-grid">${cards}</div>`;
}

function tempRenderRegistros() {
  const hoy = new Date().toISOString().slice(0,10);
  const rows = tempRegistros.map(r => {
    const esAlerta = r.alerta;
    const tempClass = esAlerta ? 'temp-temp-alert' : 'temp-temp-ok';
    return `<tr class="${esAlerta ? 'temp-tr-alert' : ''}">
      <td>${r.fecha}</td>
      <td>${r.hora}</td>
      <td>${r.unidad_nombre}</td>
      <td style="font-size:11px;color:var(--text2)">${TEMP_NOMBRES[r.tipo] || r.tipo}</td>
      <td class="${tempClass}">${r.temperatura}°C</td>
      <td>${r.responsable}</td>
      <td style="font-size:12px;color:var(--text2)">${r.observaciones || '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('temp-tab-content').innerHTML = `
    <div class="temp-table-wrap">
      <div class="temp-toolbar">
        <input class="temp-search" id="temp-search" placeholder="Buscar por unidad, responsable..." oninput="tempFiltrarRegistros()"/>
        <select class="temp-input" id="temp-filtro-alerta" onchange="tempFiltrarRegistros()" style="width:auto;padding:8px 12px">
          <option value="todos">Todos</option>
          <option value="alertas">Solo alertas</option>
          <option value="ok">Solo normales</option>
        </select>
      </div>
      <table>
        <thead><tr>
          <th>Fecha</th><th>Hora</th><th>Unidad</th><th>Tipo</th>
          <th>Temperatura</th><th>Responsable</th><th>Observaciones</th>
        </tr></thead>
        <tbody id="temp-tbody">${rows || '<tr><td colspan="7" class="empty">Sin registros</td></tr>'}</tbody>
      </table>
    </div>`;
}

function tempFiltrarRegistros() {
  const q = (document.getElementById('temp-search')?.value || '').toLowerCase();
  const filtro = document.getElementById('temp-filtro-alerta')?.value || 'todos';

  let regs = tempRegistros;
  if (q) regs = regs.filter(r =>
    r.unidad_nombre.toLowerCase().includes(q) ||
    r.responsable.toLowerCase().includes(q)
  );
  if (filtro === 'alertas') regs = regs.filter(r => r.alerta);
  if (filtro === 'ok') regs = regs.filter(r => !r.alerta);

  const rows = regs.map(r => {
    const tempClass = r.alerta ? 'temp-temp-alert' : 'temp-temp-ok';
    return `<tr class="${r.alerta ? 'temp-tr-alert' : ''}">
      <td>${r.fecha}</td><td>${r.hora}</td><td>${r.unidad_nombre}</td>
      <td style="font-size:11px;color:var(--text2)">${TEMP_NOMBRES[r.tipo] || r.tipo}</td>
      <td class="${tempClass}">${r.temperatura}°C</td>
      <td>${r.responsable}</td>
      <td style="font-size:12px;color:var(--text2)">${r.observaciones || '—'}</td>
    </tr>`;
  }).join('');

  const tbody = document.getElementById('temp-tbody');
  if(tbody) tbody.innerHTML = rows || '<tr><td colspan="7" class="empty">Sin registros</td></tr>';
}

// ── NUEVO REGISTRO ──
function tempNuevoRegistro() {
  if (!tempUnidades.length) {
    toast('Primero agregá una unidad de frío', 'error'); return;
  }
  const hoy = new Date().toISOString().slice(0,10);
  const ahora = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const optsUnidades = tempUnidades.map(u =>
    `<option value="${u.id}" data-tipo="${u.tipo}">${u.nombre} (${TEMP_NOMBRES[u.tipo]})</option>`
  ).join('');

  document.getElementById('temp-modal-body').innerHTML = `
    <div class="temp-modal-title">
      <span>🌡️ Registrar Temperatura</span>
      <button class="temp-close" onclick="tempCloseModal()">✕</button>
    </div>
    <div class="temp-field"><label>Unidad de frío</label>
      <select class="temp-input" id="tr-unidad">${optsUnidades}</select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="temp-field"><label>Fecha</label><input class="temp-input" id="tr-fecha" type="date" value="${hoy}"/></div>
      <div class="temp-field"><label>Hora</label><input class="temp-input" id="tr-hora" type="time" value="${ahora}"/></div>
    </div>
    <div class="temp-field"><label>Temperatura (°C)</label>
      <input class="temp-input" id="tr-temp" type="number" step="0.1" placeholder="Ej: -20.5"/>
    </div>
    <div class="temp-field"><label>Responsable</label>
      <input class="temp-input" id="tr-responsable" placeholder="Nombre del responsable"/>
    </div>
    <div class="temp-field"><label>Observaciones (opcional)</label>
      <input class="temp-input" id="tr-obs" placeholder="Notas adicionales..."/>
    </div>
    <div id="tr-alerta-msg" style="display:none;background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:8px;padding:10px;font-size:13px;color:#ef4444;margin-top:8px">
      ⚠️ Temperatura fuera del rango permitido para este tipo de unidad
    </div>
    <div class="temp-modal-actions">
      <button class="temp-btn primary" onclick="tempGuardarRegistro()">Guardar</button>
      <button class="temp-btn secondary" onclick="tempCloseModal()">Cancelar</button>
    </div>`;

  // Verificar alerta al cambiar temp
  document.getElementById('tr-temp').addEventListener('input', function() {
    const sel = document.getElementById('tr-unidad');
    const tipo = sel.options[sel.selectedIndex]?.dataset.tipo;
    const temp = parseFloat(this.value);
    const alertaEl = document.getElementById('tr-alerta-msg');
    if (!isNaN(temp) && tipo && alertaEl) {
      alertaEl.style.display = tempEsAlerta(temp, tipo) ? 'block' : 'none';
    }
  });

  document.getElementById('temp-modal').classList.add('open');
}

async function tempGuardarRegistro() {
  const sel = document.getElementById('tr-unidad');
  const unidadId = sel.value;
  const unidad = tempUnidades.find(u => u.id === unidadId);
  const fecha = document.getElementById('tr-fecha').value;
  const hora = document.getElementById('tr-hora').value;
  const temp = parseFloat(document.getElementById('tr-temp').value);
  const responsable = document.getElementById('tr-responsable').value.trim();
  const obs = document.getElementById('tr-obs').value.trim();

  if (!fecha || !hora || isNaN(temp) || !responsable) {
    toast('Completá todos los campos obligatorios', 'error'); return;
  }

  const esAlerta = tempEsAlerta(temp, unidad.tipo);

  try {
    await api('temp_registros?select=*', 'POST', {
      cliente_id: STATE.cliente.id,
      unidad_id: unidadId,
      unidad_nombre: unidad.nombre,
      tipo: unidad.tipo,
      fecha, hora,
      temperatura: temp,
      responsable,
      observaciones: obs,
      alerta: esAlerta
    });
    toast(esAlerta ? '⚠️ Registro guardado con alerta de temperatura' : '✅ Temperatura registrada');
    tempCloseModal();
    await tempLoadData(STATE.cliente.id);
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function tempGuardarUnidad() {
  const nombre = document.getElementById('tu-nombre').value.trim();
  const tipo = document.getElementById('tu-tipo').value;
  const ubicacion = document.getElementById('tu-ubicacion').value.trim();

// ── EXPORTAR EXCEL ──
function tempExportarExcel() {
  if (!tempRegistros.length) { toast('Sin registros para exportar', 'error'); return; }

  // Generar CSV con BOM para Excel
  const bom = '\uFEFF';
  const headers = ['Fecha','Hora','Unidad','Tipo','Temperatura (°C)','Responsable','Observaciones','Alerta'];
  const rows = tempRegistros.map(r => [
    r.fecha, r.hora, r.unidad_nombre,
    TEMP_NOMBRES[r.tipo] || r.tipo,
    r.temperatura, r.responsable,
    r.observaciones || '',
    r.alerta ? 'ALERTA' : 'Normal'
  ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));

  const csv = bom + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `temperaturas_${STATE.cliente?.id?.slice(0,8) || 'cliente'}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('✅ Archivo descargado — abrilo con Excel');
}

// ── ANÁLISIS IA ──
async function tempAnalisisIA() {
  const wrap = document.querySelector('.temp-wrap');
  if (!wrap) return;

  let panel = document.getElementById('temp-ai-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.className = 'temp-ai-panel';
    panel.id = 'temp-ai-panel';
    panel.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:#8b5cf6">🤖 Análisis IA — Temperaturas</div>
        <button class="temp-btn secondary" style="padding:4px 10px;font-size:11px" onclick="this.parentElement.parentElement.remove()">✕</button>
      </div>
      <div class="temp-ai-loading" id="temp-ai-loading"><div class="mant-spinner"></div> Analizando registros...</div>
      <div class="temp-ai-response" id="temp-ai-response" style="display:none"></div>`;
    wrap.appendChild(panel);
  } else {
    panel.querySelector('#temp-ai-loading').style.display = 'flex';
    panel.querySelector('#temp-ai-response').style.display = 'none';
  }

  const hoy = new Date().toISOString().slice(0,10);
  const alertasTotal = tempRegistros.filter(r => r.alerta).length;
  const alertasHoy = tempRegistros.filter(r => r.alerta && r.fecha === hoy).length;
  const porUnidad = tempUnidades.map(u => {
    const regs = tempRegistros.filter(r => r.unidad_id === u.id);
    const alertas = regs.filter(r => r.alerta).length;
    const temps = regs.map(r => parseFloat(r.temperatura)).filter(t => !isNaN(t));
    const promedio = temps.length ? (temps.reduce((a,b) => a+b, 0) / temps.length).toFixed(1) : null;
    const ultima = regs[0];
    return { nombre: u.nombre, tipo: u.tipo, total: regs.length, alertas, promedio, ultima_temp: ultima?.temperatura };
  });

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Sos un experto en inocuidad alimentaria y control de cadena de frío. Analizá los siguientes datos de temperaturas y generá un informe ejecutivo en español con:
1. **Estado actual de la cadena de frío**
2. **Alertas críticas** (unidades fuera de rango)
3. **Tendencias** (unidades con más alertas históricas)
4. **Recomendaciones correctivas inmediatas**
5. **Proyección de riesgos** si continúan las tendencias

Límites normativos: Heladera/Cámara frigorífica ≤5°C, Cámara verduras ≤8°C, Freezer ≤-18°C

Datos:
- Total registros: ${tempRegistros.length}
- Alertas totales: ${alertasTotal}
- Alertas hoy: ${alertasHoy}
- Por unidad: ${JSON.stringify(porUnidad, null, 2)}

Sé concreto, usa bullet points, máximo 400 palabras.`
        }]
      })
    });
    const data = await resp.json();
    const texto = data.content?.[0]?.text || 'No se pudo generar el análisis.';
    panel.querySelector('#temp-ai-loading').style.display = 'none';
    const respEl = panel.querySelector('#temp-ai-response');
    respEl.style.display = 'block';
    respEl.textContent = texto;
  } catch(e) {
    panel.querySelector('#temp-ai-loading').style.display = 'none';
    const respEl = panel.querySelector('#temp-ai-response');
    respEl.style.display = 'block';
    respEl.textContent = 'Error al conectar con la IA: ' + e.message;
  }
}

async function guardarOperario(clienteId, empresa) {
  const nombre = document.getElementById('op-nombre').value.trim();
  const clave = document.getElementById('op-clave').value.trim();
  const errEl = document.getElementById('op-err');
  errEl.textContent = '';

  if (!nombre) { errEl.textContent = 'Ingresá el nombre'; return; }
  if (!clave || clave.length < 6) { errEl.textContent = 'La clave debe tener al menos 6 caracteres'; return; }

  try {
    await api('operarios?select=*', 'POST', {
      cliente_id: clienteId,
      nombre,
      clave,
      activo: true
    });
    toast('✅ Operario registrado');
    verOperarios(clienteId, empresa);
  } catch(e) {
    if (e.message.includes('unique')) {
      errEl.textContent = 'Esa clave ya está en uso para este cliente';
    } else {
      errEl.textContent = 'Error: ' + e.message;
    }
  }
}

async function delOperario(id, clienteId, empresa) {
  if (!confirm('¿Eliminar este operario?')) return;
  try {
    await api(`operarios?id=eq.${id}`, 'DELETE');
    toast('Operario eliminado');
    verOperarios(clienteId, empresa);
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

function prodUpdateKPIs(hoy) {
  const hoyStr = hoy || new Date().toISOString().slice(0,10);
  const regsHoy = prodRegistros.filter(r => r.fecha === hoyStr);
  const eficiencias = prodRegistros.filter(r => r.eficiencia_cantidad).map(r => parseFloat(r.eficiencia_cantidad));
  const efProm = eficiencias.length ? (eficiencias.reduce((a,b) => a+b, 0) / eficiencias.length).toFixed(1) : '—';
  const totalProd = prodRegistros.reduce((s,r) => s + parseFloat(r.cantidad_real || 0), 0).toFixed(0);
  const totalDescarte = prodRegistros.reduce((s,r) => s + parseFloat(r.descarte || 0), 0).toFixed(0);

  const kh = document.getElementById('pkpi-hoy');
  const ke = document.getElementById('pkpi-ef');
  const kp = document.getElementById('pkpi-prod');
  const kd = document.getElementById('pkpi-descarte');
  if(kh) kh.textContent = regsHoy.length;
  if(ke) ke.textContent = efProm !== '—' ? efProm + '%' : '—';
  if(kp) kp.textContent = totalProd;
  if(kd) kd.textContent = totalDescarte;
}

function prodCalcEf() {
  const teo = parseFloat(document.getElementById('pr-teorico')?.value) || 0;
  const real = parseFloat(document.getElementById('pr-real')?.value) || 0;
  const personas = parseInt(document.getElementById('pr-personas')?.value) || 0;
  const horas = parseFloat(document.getElementById('pr-horas')?.value) || 0;

  const efEl = document.getElementById('pr-ef-display');
  const efIntEl = document.getElementById('pr-ef-integral');

  if (teo > 0 && real >= 0) {
    const efCant = (real / teo * 100).toFixed(1);
    const color = efCant >= 90 ? '#10b981' : efCant >= 70 ? '#f59e0b' : '#ef4444';
    if(efEl) { efEl.textContent = efCant + '%'; efEl.style.color = color; }

    // Eficiencia integral si hay personas y horas
    if (personas > 0 && horas > 0 && teo > 0) {
      const prodPorPersonaHora = (real / (personas * horas)).toFixed(2);
      const teoPorPersonaHora = (teo / (personas * horas)).toFixed(2);
      const efPersonas = (real / teo * 100).toFixed(1);
      if(efIntEl) {
        efIntEl.style.display = 'block';
        efIntEl.innerHTML = `
          <div style="display:flex;gap:20px;flex-wrap:wrap">
            <span>Ef. cantidad: <strong style="color:${color}">${efCant}%</strong></span>
            <span>Prod/persona/hora: <strong style="color:#00d4ff">${prodPorPersonaHora}</strong></span>
            <span>Teórico/persona/hora: <strong style="color:#8b5cf6">${teoPorPersonaHora}</strong></span>
          </div>`;
      }
    }
  } else {
    if(efEl) { efEl.textContent = '—'; efEl.style.color = 'var(--text2)'; }
    if(efIntEl) efIntEl.style.display = 'none';
  }
}

// ── GUARDAR REGISTRO ──
async function prodGuardarRegistro() {
  const lineaId = document.getElementById('pr-linea').value;
  const linea = prodLineas.find(l => l.id === lineaId);
  const fecha = document.getElementById('pr-fecha').value;
  const turno = document.getElementById('pr-turno').value;
  const desc = document.getElementById('pr-desc').value.trim();
  const marca = document.getElementById('pr-marca').value.trim();
  const lote = document.getElementById('pr-lote').value.trim();
  const venc = document.getElementById('pr-venc').value || null;
  const teorico = parseFloat(document.getElementById('pr-teorico').value);
  const real = parseFloat(document.getElementById('pr-real').value);
  const reproceso = parseFloat(document.getElementById('pr-reproceso').value) || 0;
  const descarte = parseFloat(document.getElementById('pr-descarte').value) || 0;
  const personas = parseInt(document.getElementById('pr-personas').value);
  const horas = parseFloat(document.getElementById('pr-horas').value);
  const obs = document.getElementById('pr-obs').value.trim();

  if(!fecha || !desc || isNaN(teorico) || isNaN(real) || isNaN(personas) || isNaN(horas)) {
    toast('Completá todos los campos obligatorios','error'); return;
  }
  if(reproceso + descarte > (teorico - real) && (teorico - real) > 0) {
    toast('Reproceso + descarte no puede superar la diferencia','error'); return;
  }

  try {
    const [registro] = await api('prod_registros?select=*', 'POST', {
      cliente_id: STATE.cliente.id,
      linea_id: lineaId,
      linea_nombre: linea.nombre,
      fecha, turno,
      producto_descripcion: desc,
      producto_marca: marca || null,
      producto_lote: lote || null,
      producto_vencimiento: venc,
      cantidad_teorica: teorico,
      cantidad_real: real,
      reproceso, descarte,
      personas, horas_trabajadas: horas,
      observaciones: obs || null
    });

    // Guardar paradas
    for(const p of prodParadasTemp) {
      let mantId = null;

      // Si genera mantenimiento, crear solicitud
      if(p.generaMant) {
        const clienteId = STATE.cliente.id;
        // Obtener próximo número de solicitud
        const contResp = await api(`mant_contadores?cliente_id=eq.${clienteId}&select=ultimo_numero`);
        let numero = 1;
        if(contResp.length) {
          numero = contResp[0].ultimo_numero + 1;
          await api(`mant_contadores?cliente_id=eq.${clienteId}`, 'PATCH', { ultimo_numero: numero });
        } else {
          await api('mant_contadores', 'POST', { cliente_id: clienteId, ultimo_numero: 1 });
        }
        const codigo = 'R-MA-' + String(numero).padStart(3,'0');
        const [solicitud] = await api('mant_solicitudes?select=*', 'POST', {
          cliente_id: clienteId,
          codigo,
          sector: linea.nombre,
          equipo_nombre: 'Línea ' + linea.nombre,
          equipo_numero: lineaId.slice(0,8),
          descripcion: `Parada de línea: ${p.desc} (${p.tiempo} min)`,
          urgencia: p.tipo === 'mecanica' || p.tipo === 'electrica' ? 'urgente' : 'normal',
          solicitante: STATE.user.nombre,
          estado: 'solicitada'
        });
        mantId = solicitud.id;
      }

      await api('prod_paradas?select=*', 'POST', {
        cliente_id: STATE.cliente.id,
        registro_id: registro.id,
        descripcion: p.desc,
        tiempo_minutos: p.tiempo,
        tipo: p.tipo,
        genera_mantenimiento: p.generaMant,
        solicitud_mant_id: mantId
      });
    }

    const paradasConMant = prodParadasTemp.filter(p => p.generaMant).length;
    toast(`✅ Registro guardado${paradasConMant > 0 ? ` · ${paradasConMant} solicitud(es) de mantenimiento generadas` : ''}`);
    prodParadasTemp = [];
    prodCloseModal();
    await prodLoadData(STATE.cliente.id);
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ── EXPORTAR ──
function prodExportar() {
  if(!prodRegistros.length) { toast('Sin registros para exportar','error'); return; }
  const bom = '\uFEFF';
  const headers = ['Fecha','Turno','Línea','Producto','Marca','Lote','Vencimiento','Teórico','Real','Diferencia','Reproceso','Descarte','Eficiencia%','Personas','Horas','Observaciones'];
  const rows = prodRegistros.map(r => [
    r.fecha, r.turno, r.linea_nombre, r.producto_descripcion,
    r.producto_marca||'', r.producto_lote||'', r.producto_vencimiento||'',
    r.cantidad_teorica, r.cantidad_real, r.diferencia||0,
    r.reproceso||0, r.descarte||0, r.eficiencia_cantidad||'',
    r.personas, r.horas_trabajadas, r.observaciones||''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));

  const csv = bom + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `produccion_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('✅ Exportado — abrilo con Excel');
}

      <div class="temp-ai-response" id="prod-ai-response" style="display:none"></div>`;
    wrap.appendChild(panel);
  } else {
    panel.querySelector('#prod-ai-loading').style.display = 'flex';
    panel.querySelector('#prod-ai-response').style.display = 'none';
  }

  const eficiencias = prodRegistros.map(r => parseFloat(r.eficiencia_cantidad)).filter(e => !isNaN(e));
  const efProm = eficiencias.length ? (eficiencias.reduce((a,b)=>a+b,0)/eficiencias.length).toFixed(1) : 0;
  const totalDesc = prodRegistros.reduce((s,r) => s+parseFloat(r.descarte||0),0).toFixed(0);
  const totalRep = prodRegistros.reduce((s,r) => s+parseFloat(r.reproceso||0),0).toFixed(0);
  const porLinea = prodLineas.map(l => {
    const regs = prodRegistros.filter(r => r.linea_id === l.id);
    const efs = regs.map(r => parseFloat(r.eficiencia_cantidad)).filter(e => !isNaN(e));
    return {
      linea: l.nombre,
      registros: regs.length,
      eficiencia_prom: efs.length ? (efs.reduce((a,b)=>a+b,0)/efs.length).toFixed(1) : 0,
      descarte_total: regs.reduce((s,r)=>s+parseFloat(r.descarte||0),0).toFixed(0),
      reproceso_total: regs.reduce((s,r)=>s+parseFloat(r.reproceso||0),0).toFixed(0)
    };
  });

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Sos un experto en gestión de producción industrial. Analizá los siguientes datos y generá un informe ejecutivo en español con:
1. **Estado general de la producción**
2. **Acciones inmediatas** (problemas urgentes a resolver)
3. **Acciones correctivas** (mejoras a implementar)
4. **Líneas con mejor y peor desempeño**
5. **Proyección y recomendaciones**

Datos:
- Total registros: ${prodRegistros.length}
- Eficiencia promedio: ${efProm}%
- Descarte total: ${totalDesc}
- Reproceso total: ${totalRep}
- Por línea: ${JSON.stringify(porLinea, null, 2)}

Sé concreto, usá bullet points, máximo 400 palabras.`
        }]
      })
    });
    const data = await resp.json();
    const texto = data.content?.[0]?.text || 'No se pudo generar el análisis.';
    panel.querySelector('#prod-ai-loading').style.display = 'none';
    const respEl = panel.querySelector('#prod-ai-response');
    respEl.style.display = 'block';
    respEl.textContent = texto;
  } catch(e) {
    panel.querySelector('#prod-ai-loading').style.display = 'none';
    const respEl = panel.querySelector('#prod-ai-response');
    respEl.style.display = 'block';
    respEl.textContent = 'Error: ' + e.message;
  }
}

function prodCloseModal() {
  const m = document.getElementById('prod-modal');
  if(m) m.classList.remove('open');
  prodParadasTemp = [];
}


// ══════════════════════════════════════════════
// SIDEBAR MÓVIL — Toggle + Swipe desde borde izquierdo
// ══════════════════════════════════════════════

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sb.classList.contains('open');
  if (isOpen) {
    closeSidebar();
  } else {
    sb.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
}

function closeSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sb.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// Cerrar sidebar al hacer click en un nav-item (móvil)
document.addEventListener('click', function(e) {
  if (window.innerWidth <= 768 && e.target.closest('.nav-item')) {
    setTimeout(closeSidebar, 150);
  }
});

// Swipe desde borde izquierdo para abrir sidebar
(function() {
  let touchStartX = 0;
  let touchStartY = 0;
  let isSwiping = false;

  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    isSwiping = touchStartX < 30; // solo desde borde izquierdo (30px)
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isSwiping) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = Math.abs(e.touches[0].clientY - touchStartY);
    if (dx > 40 && dy < 60) {
      const sb = document.getElementById('sidebar');
      if (!sb.classList.contains('open')) {
        sb.classList.add('open');
        document.getElementById('sidebar-overlay').classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      isSwiping = false;
    }
  }, { passive: true });

  // Swipe izquierda para cerrar sidebar abierto
  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.getElementById('sidebar') && document.getElementById('sidebar').addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.getElementById('sidebar') && document.getElementById('sidebar').addEventListener('touchmove', function(e) {
    const dx = e.touches[0].clientX - touchStartX;
    if (dx < -50) closeSidebar();
  }, { passive: true });
})();

// Ajustar en resize — desktop siempre visible
window.addEventListener('resize', function() {
  if (window.innerWidth > 768) {
    closeSidebar();
    document.body.style.overflow = '';
  }
});
</script>
