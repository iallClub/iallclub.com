  :root {
    --bg: #0a0a0f;
    --bg2: #0f0f1a;
    --bg3: #141428;
    --card: #1a1a2e;
    --border: #2a2a4a;
    --cyan: #00d4ff;
    --purple: #8b5cf6;
    --green: #10b981;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --grad: linear-gradient(135deg, #00f5c4, #0099ff);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  /* LOGIN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: radial-gradient(ellipse at 50% 50%, #1a0a2e 0%, #0a0a0f 70%);
  }
  .login-box {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:40px; width:380px; text-align:center;
  }
  .login-logo { font-size:28px; font-weight:900; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; font-family:'Syne',sans-serif; letter-spacing:-0.02em; }
  .login-sub { color:var(--text2); font-size:13px; margin-bottom:32px; }
  .login-box input {
    width:100%; padding:12px 16px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:14px; margin-bottom:12px; outline:none;
    transition:.2s;
  }
  .login-box input:focus { border-color:var(--cyan); }
  .btn-primary {
    width:100%; padding:12px; background:var(--grad); border:none; border-radius:8px;
    color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:.2s;
  }
  .btn-primary:hover { opacity:.85; }
  .login-err { color:var(--red); font-size:13px; margin-top:10px; min-height:20px; }

  /* MAIN APP */
  #app { display:none; min-height:100vh; }
  .topbar {
    background:var(--bg2); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px; height:56px; position:sticky; top:0; z-index:100;
  }
  .topbar-logo { font-size:18px; font-weight:900; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-family:'Syne',sans-serif; }
  .topbar-right { display:flex; align-items:center; gap:16px; }
  .topbar-user { font-size:13px; color:var(--text2); }
  .btn-sm {
    padding:6px 14px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--text2); font-size:12px; cursor:pointer; transition:.2s;
  }
  .btn-sm:hover { border-color:var(--cyan); color:var(--cyan); }
  .nav-back {
    font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:2px;
    color:#5a6080; text-decoration:none; transition:color 0.2s; text-transform:uppercase;
  }
  .nav-back:hover { color:var(--cyan); }

  .main-layout { display:flex; min-height:calc(100vh - 56px); }
  .sidebar {
    width:220px; background:var(--bg2); border-right:1px solid var(--border);
    padding:20px 12px; display:flex; flex-direction:column; gap:4px;
    position:sticky; top:56px; height:calc(100vh - 56px); overflow-y:auto;
  }
  .sidebar-title { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:1px; padding:8px 12px 4px; }
  .nav-item {
    padding:10px 12px; border-radius:8px; cursor:pointer; transition:.2s;
    font-size:13px; color:var(--text2); display:flex; align-items:center; gap:10px;
    border:1px solid transparent;
  }
  .nav-item:hover { background:var(--bg3); color:var(--text); }
  .nav-item.active { background:var(--bg3); color:var(--cyan); border-color:var(--border); }
  .nav-item .icon { font-size:16px; width:20px; text-align:center; }

  .content { flex:1; padding:28px; overflow-y:auto; }

  /* CARDS */
  .page-title { font-size:22px; font-weight:700; margin-bottom:4px; font-family:'Syne',sans-serif; letter-spacing:-0.02em; }
  .page-sub { color:var(--text2); font-size:13px; margin-bottom:24px; }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:28px; }
  .kpi-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px;
    transition:.2s;
  }
  .kpi-card:hover { border-color:var(--border); transform:translateY(-2px); }
  .kpi-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .kpi-value { font-size:28px; font-weight:800; margin-top:4px; }
  .kpi-value.cyan { color:var(--cyan); }
  .kpi-value.purple { color:var(--purple); }
  .kpi-value.green { color:var(--green); }
  .kpi-value.red { color:var(--red); }
  .kpi-value.yellow { color:var(--yellow); }

  /* TABLES */
  .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .table-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .table-header h3 { font-size:15px; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th { padding:12px 16px; text-align:left; font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
  td { padding:12px 16px; font-size:13px; border-bottom:1px solid rgba(255,255,255,.04); }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }

  .badge {
    display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
  }
  .badge.green { background:rgba(16,185,129,.15); color:var(--green); }
  .badge.red { background:rgba(239,68,68,.15); color:var(--red); }
  .badge.yellow { background:rgba(245,158,11,.15); color:var(--yellow); }
  .badge.cyan { background:rgba(0,212,255,.15); color:var(--cyan); }
  .badge.purple { background:rgba(139,92,246,.15); color:var(--purple); }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.7);
    align-items:center; justify-content:center; z-index:1000; display:none;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:28px; width:460px; max-width:95vw; max-height:90vh; overflow-y:auto;
  }
  .modal h3 { font-size:17px; font-weight:700; margin-bottom:20px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:12px; color:var(--text2); margin-bottom:6px; }
  .form-group input, .form-group select {
    width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:13px; outline:none; transition:.2s;
  }
  .form-group input:focus, .form-group select:focus { border-color:var(--cyan); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }
  .btn-cancel { flex:1; padding:10px; background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text2); cursor:pointer; transition:.2s; }
  .btn-cancel:hover { border-color:var(--red); color:var(--red); }
  .btn-save { flex:2; padding:10px; background:var(--grad); border:none; border-radius:8px; color:#fff; font-weight:700; cursor:pointer; transition:.2s; }
  .btn-save:hover { opacity:.85; }
  .btn-save:disabled { opacity:.5; cursor:not-allowed; }

  /* MÓDULOS GRID */
  .modules-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; }
  .module-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px;
    cursor:pointer; transition:.2s; text-align:center;
  }
  .module-card:hover { border-color:var(--cyan); transform:translateY(-2px); }
  .module-card.locked { opacity:.4; cursor:not-allowed; }
  .module-card.locked:hover { transform:none; border-color:var(--border); }
  .module-icon { font-size:36px; margin-bottom:12px; }
  .module-name { font-size:14px; font-weight:700; margin-bottom:4px; }
  .module-desc { font-size:11px; color:var(--text2); }

  /* MÓDULO ABIERTO */
  .module-back { display:flex; align-items:center; gap:8px; color:var(--cyan); cursor:pointer; font-size:13px; margin-bottom:20px; }
  .module-back:hover { opacity:.7; }

  /* SUSPENDIDO */
  .suspended-banner {
    background:rgba(239,68,68,.1); border:1px solid var(--red); border-radius:12px;
    padding:20px 24px; margin-bottom:24px; display:flex; align-items:center; gap:16px;
  }

  /* TABS */
  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--bg2); padding:4px; border-radius:10px; width:fit-content; }
  .tab { padding:8px 18px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text2); transition:.2s; }
  .tab.active { background:var(--card); color:var(--cyan); }

  .action-btn { padding:6px 12px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:600; transition:.2s; margin-right:4px; }
  .action-btn.edit { background:rgba(0,212,255,.1); color:var(--cyan); }
  .action-btn.del { background:rgba(239,68,68,.1); color:var(--red); }
  .action-btn.pay { background:rgba(16,185,129,.1); color:var(--green); }
  .action-btn:hover { opacity:.7; }

  .loading { text-align:center; padding:40px; color:var(--text2); font-size:14px; }
  .empty { text-align:center; padding:40px; color:var(--text2); font-size:13px; }

  .backup-btn {
    padding:10px 20px; background:rgba(139,92,246,.15); border:1px solid var(--purple);

  }

  .modulos-check { display:flex; flex-wrap:wrap; gap:10px; }
  .mod-check { display:flex; align-items:center; gap:6px; font-size:13px; cursor:pointer; padding:6px 10px; background:var(--bg3); border-radius:6px; border:1px solid var(--border); transition:.2s; }

  #toast {
    position:fixed; bottom:24px; right:24px; background:var(--card); border:1px solid var(--border);

  #toast.success { border-color:var(--green); color:var(--green); }

  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }

}
.module-card:hover .mod-icon-wrap { transform: scale(1.12) translateY(-3px); }
.module-card:hover .mod-icon-wrap svg { filter: drop-shadow(0 6px 16px rgba(0,200,255,0.3)); }

/* MANTENIMIENTO */
/* Plan de mantenimiento preventivo */
.mant-plan-badge-vence { background:rgba(245,158,11,.15); color:#f59e0b; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
.mant-plan-badge-ok { background:rgba(16,185,129,.15); color:#10b981; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }

.module-card:hover .gear-outer { animation: ic-spin 3s linear infinite; }

/* STOCK */

.module-card:hover .cube-float { animation: ic-float 2s ease-in-out infinite; }

/* PRODUCCIÓN */
.module-card:hover .hr1x { animation: ic-spin 6s linear infinite; }
.module-card:hover .hr2x { animation: ic-spin-r 4s linear infinite; }
.module-card:hover .hcorex { animation: ic-breathe 2s ease-in-out infinite; }

.module-card:hover .pz-bl { animation: ic-puz-bl 2.8s ease-in-out infinite; }
.module-card:hover .pz-br { animation: ic-puz-br 2.8s ease-in-out infinite; }
.module-card:hover .n1x,.module-card:hover .n2x,.module-card:hover .n3x,

/* COMERCIAL */

.module-card:hover .bar2 { animation: ic-bar 1.2s 0.15s ease-in-out infinite; }

.module-card:hover .bar4 { animation: ic-bar 1.2s 0.45s ease-in-out infinite; }

/* CÁMARA */
.module-card:hover .frost-c { animation: ic-spin 6s linear infinite; }
.module-card:hover .merc-bar { animation: ic-temp 4s ease-in-out infinite; }

/* CALIDAD */
.module-card:hover .shield-g { animation: ic-breathe 1.8s ease-in-out infinite; }
.module-card:hover .check-g { animation: ic-breathe 1.8s ease-in-out infinite; }
.module-card:hover .star-g { animation: ic-spin 3s linear infinite; }

@keyframes ic-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes ic-spin-r { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
@keyframes ic-breathe { 0%,100%{transform:scale(1);opacity:.9} 50%{transform:scale(1.08);opacity:1} }
@keyframes ic-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes ic-wrench { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
@keyframes ic-node { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.4);opacity:1} }
@keyframes ic-bar { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.12)} }
@keyframes ic-arrow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
@keyframes ic-temp { 0%,100%{transform:scaleY(0.35)} 50%{transform:scaleY(0.85)} }
@keyframes ic-puz-tl { 0%,100%{transform:translate(-8px,-8px);opacity:.65} 45%,55%{transform:translate(0,0);opacity:1} }
@keyframes ic-puz-tr { 0%,100%{transform:translate(8px,-8px);opacity:.65} 45%,55%{transform:translate(0,0);opacity:1} }
@keyframes ic-puz-bl { 0%,100%{transform:translate(-8px,8px);opacity:.65} 45%,55%{transform:translate(0,0);opacity:1} }
@keyframes ic-puz-br { 0%,100%{transform:translate(8px,8px);opacity:.65} 45%,55%{transform:translate(0,0);opacity:1} }


/* ── MANTENIMIENTO MODULE ── */
.mant-wrap { padding: 0; }
.mant-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.mant-title { font-size: 20px; font-weight: 700; font-family: 'Syne', sans-serif; }
.mant-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.mant-btn {
  padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: .2s; font-family: 'DM Sans', sans-serif;
}
.mant-btn.primary { background: linear-gradient(135deg,#00f5c4,#0099ff); color: #000; }
.mant-btn.secondary { background: rgba(0,212,255,.1); color: #00d4ff; border: 1px solid rgba(0,212,255,.3); }
.mant-btn.danger { background: rgba(239,68,68,.1); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
.mant-btn.ai { background: linear-gradient(135deg,#8b5cf6,#00d4ff); color: #fff; }
.mant-btn.green { background: rgba(16,185,129,.1); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
.mant-btn:hover { opacity: .8; transform: translateY(-1px); }

/* KPIs */
.mant-kpis { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 12px; margin-bottom: 24px; }
.mant-kpi { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; text-align: center; }
.mant-kpi-label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
.mant-kpi-val { font-size: 28px; font-weight: 800; }
.mant-kpi-val.urgente { color: #ef4444; }
.mant-kpi-val.normal { color: #f59e0b; }
.mant-kpi-val.baja { color: #10b981; }
.mant-kpi-val.cyan { color: #00d4ff; }
.mant-kpi-val.purple { color: #8b5cf6; }

/* Tabs */
.mant-tabs { display: flex; gap: 4px; background: var(--bg2); padding: 4px; border-radius: 10px; margin-bottom: 20px; width: fit-content; }
.mant-tab { padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); transition: .2s; border: none; background: transparent; font-family: 'DM Sans',sans-serif; }
.mant-tab.active { background: var(--card); color: #00d4ff; }

/* Kanban */
.mant-kanban { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
.mant-col { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; min-height: 300px; }
.mant-col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.mant-col-count { background: var(--bg3); border-radius: 20px; padding: 2px 8px; font-size: 11px; }

/* Cards de solicitud */
.mant-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px; margin-bottom: 10px; cursor: pointer; transition: .2s;
}
.mant-card:hover { border-color: #00d4ff; transform: translateY(-1px); }
.mant-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.mant-card-code { font-size: 11px; font-family: monospace; color: var(--text2); }
.mant-urgencia {
  padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase;
}
.mant-urgencia.urgente { background: rgba(239,68,68,.15); color: #ef4444; border: 1px solid rgba(239,68,68,.3); }
.mant-urgencia.normal { background: rgba(245,158,11,.15); color: #f59e0b; border: 1px solid rgba(245,158,11,.3); }
.mant-urgencia.baja { background: rgba(16,185,129,.15); color: #10b981; border: 1px solid rgba(16,185,129,.3); }
.mant-card-equipo { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.mant-card-desc { font-size: 12px; color: var(--text2); line-height: 1.4; margin-bottom: 8px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.mant-card-footer { font-size: 11px; color: var(--text2); display: flex; justify-content: space-between; }

/* Modal de detalle */
.mant-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 2000; align-items: center; justify-content: center; }
.mant-modal.open { display: flex; }
.mant-modal-box {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 28px; width: 580px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
}
.mant-modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; font-family: 'Syne',sans-serif; display: flex; align-items: center; justify-content: space-between; }
.mant-close { cursor: pointer; color: var(--text2); font-size: 20px; background: none; border: none; }
.mant-close:hover { color: #ef4444; }
.mant-field { margin-bottom: 14px; }
.mant-field label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
.mant-field .val { font-size: 14px; }
.mant-input {
  width: 100%; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none; transition: .2s;
  font-family: 'DM Sans', sans-serif;
}
.mant-input:focus { border-color: #00d4ff; }
.mant-textarea { min-height: 80px; resize: vertical; }
.mant-modal-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.mant-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.mant-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 12px; }

/* Equipos */
.mant-equipo-list { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 12px; }
.mant-equipo-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
  display: flex; align-items: center; gap: 12px;
}
.mant-equipo-icon { font-size: 24px; }
.mant-equipo-info { flex: 1; }
.mant-equipo-name { font-size: 13px; font-weight: 600; }
.mant-equipo-num { font-size: 11px; color: var(--text2); font-family: monospace; }
.mant-equipo-sector { font-size: 11px; color: #00d4ff; }

/* AI Panel */
.mant-ai-panel {
  background: linear-gradient(135deg, rgba(139,92,246,.1), rgba(0,212,255,.1));
  border: 1px solid rgba(139,92,246,.3); border-radius: 12px; padding: 20px; margin-top: 20px;
}
.mant-ai-response { font-size: 13px; line-height: 1.7; white-space: pre-wrap; margin-top: 12px; }
.mant-ai-loading { display: flex; align-items: center; gap: 8px; color: var(--text2); font-size: 13px; }
.mant-spinner { width: 16px; height: 16px; border: 2px solid rgba(139,92,246,.3); border-top-color: #8b5cf6; border-radius: 50%; animation: spin .6s linear infinite; }

/* PDF preview area */
.mant-pdf-btn {
  padding: 8px 16px; background: rgba(16,185,129,.1); color: #10b981;
  border: 1px solid rgba(16,185,129,.3); border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: .2s; font-family: 'DM Sans',sans-serif;
}
.mant-pdf-btn:hover { background: rgba(16,185,129,.2); }

/* ══════════════════════════════════════════════
   RESPONSIVE MÓVIL — max-width: 768px
   Desktop/tablet sigue intacto
   ══════════════════════════════════════════════ */

/* Hamburguesa — visible solo en móvil */
.hamburger-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  z-index: 201;
}
.hamburger-btn span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text);
  border-radius: 2px;
  transition: .3s;
}

/* Overlay sidebar */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 199;
  backdrop-filter: blur(2px);
}
.sidebar-overlay.open { display: block; }

@media (max-width: 768px) {

  /* ── Layout ── */
  .hamburger-btn { display: flex; }

  .main-layout { display: block; }

  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 240px;
    z-index: 200;
    transform: translateX(-100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
    padding-top: 70px;
    box-shadow: 4px 0 24px rgba(0,0,0,.4);
  }
  .sidebar.open {
    transform: translateX(0);
  }

  /* Swipe área invisible en borde izquierdo */
  .swipe-zone {
    position: fixed;
    top: 0;
    left: 0;
    width: 20px;
    height: 100vh;
    z-index: 198;
  }

  .content { 
    width: 100%; 
    min-width: 0;
    padding: 12px;
    box-sizing: border-box;
  }

  /* ── Topbar ── */
  .topbar { padding: 0 12px; }
  .topbar-user { 
    font-size: 11px; 
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Dashboard cards ── */
  .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
  .stat-card { padding: 14px !important; }
  .stat-val { font-size: 24px !important; }

  /* ── Tablas ── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 500px; }
  th, td { padding: 8px 10px !important; font-size: 12px !important; }

  /* ── Modales ── */
  .modal { padding: 12px !important; }
  .modal-box { 
    width: 95vw !important; 
    max-width: 95vw !important;
    max-height: 90vh;
    overflow-y: auto;
    margin: 5vh auto;
  }

  /* ── Formularios ── */
  .form-group input, 
  .form-group select, 
  .form-group textarea { font-size: 16px !important; } /* evita zoom en iOS */

  /* ── Botones de acción ── */
  .modal-actions { 
    flex-direction: column !important; 
    gap: 8px !important; 
  }
  .modal-actions button { width: 100% !important; }

  /* ── Módulo Mantenimiento ── */
  .mant-kanban { grid-template-columns: 1fr; }
  .mant-header { flex-wrap: wrap; gap: 8px; }
  .mant-tabs { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
  .mant-tab { padding: 8px 12px !important; font-size: 12px !important; }

  /* ── Módulo Cámara/Temperatura ── */
  .temp-kpis { grid-template-columns: repeat(2, 1fr) !important; }
  .temp-unidades-grid { grid-template-columns: 1fr !important; }
  .temp-header { flex-direction: column; align-items: flex-start; }
  .temp-actions { width: 100%; }
  .temp-btn { font-size: 12px !important; padding: 7px 12px !important; }

  /* ── Cards de módulos ── */
  .modulos-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
  .modulo-card { padding: 16px !important; }
  .modulo-icon { font-size: 28px !important; }
  .modulo-name { font-size: 13px !important; }

  /* ── Plan mantenimiento ── */
  .mant-equipo-list { gap: 8px; }
  .mant-equipo-card { flex-wrap: wrap; }

  /* ── KPIs admin dashboard ── */
  .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }

  /* ── Page titles ── */
  .page-title { font-size: 20px !important; }
  .page-sub { font-size: 12px !important; }
}

<script>
const SUPA_URL = 'https://smldkvlmmzlgpxrtfesz.supabase.co';
const SUPA_KEY = 'sb_publishable_HGeSd7TgEqn53VUrltY-Tg_OW_ERXQ8';

// ── Cliente Supabase Auth ────────────────────────────────
const supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);

let STATE = { user: null, cliente: null, page: 'dashboard', moduleOpen: null, suspended: false };

// ── API helpers ──────────────────────────────────────────
async function api(path, method='GET', body=null) {
  try {
    // Usar token de sesión de Supabase Auth si está disponible
    const { data: { session } } = await supabaseClient.auth.getSession();
    const token = session ? session.access_token : SUPA_KEY;

    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${token}`,
        'Prefer': 'return=representation'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
    if (!r.ok) {
      const e = await r.json();
      throw new Error(e.message || e.details || r.status);
    }
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  } catch(e) {
    console.error('API error:', e);
    throw e;
  }
}

function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3500);
}

// ── LOGIN ────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-err');
  const btn   = document.getElementById('btn-login');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Completá todos los campos'; return; }

  btn.innerHTML = '<span class="spinner"></span>Ingresando...';
  btn.disabled = true;

  try {
    // 1. Autenticar con Supabase Auth
    const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
    if (authError) {
      if (authError.message.includes('Invalid login') || authError.message.includes('invalid_credentials')) {
        err.textContent = 'Email o contraseña incorrectos';
      } else {
        err.textContent = 'Error: ' + authError.message;
      }
      return;
    }

    // 2. Obtener datos del usuario desde tabla usuarios (rol, nombre, activo, etc.)
    const users = await api(`usuarios?email=eq.${encodeURIComponent(email)}&select=*`);
    if (!users.length) { err.textContent = 'Usuario no encontrado en el sistema'; return; }
    const u = users[0];

    if (!u.activo) {
      await supabaseClient.auth.signOut();
      err.textContent = 'Usuario desactivado. Contactá a iall Club.';
      return;
    }

    STATE.user = u;

    if (u.rol === 'superadmin') {
      // Superadmin: acceso total, sin cliente asignado
      STATE.cliente = null;
      STATE.suspended = false;
    } else if (u.rol === 'admin') {
      // Admin: tiene cliente_id propio en la tabla usuarios
      if (u.cliente_id) {
        const clientes = await api(`clientes?id=eq.${u.cliente_id}&select=*`);
        if (clientes.length) {
          STATE.cliente = clientes[0];
          STATE.suspended = await checkSuspension(clientes[0].id);
        }
      }
    } else {
      // Usuario (cliente): buscar por usuario_id en clientes o por cliente_id en usuarios
      if (u.cliente_id) {
        const clientes = await api(`clientes?id=eq.${u.cliente_id}&select=*`);
        if (clientes.length) {
          STATE.cliente = clientes[0];
          STATE.suspended = await checkSuspension(clientes[0].id);
        }
      } else {
        const clientes = await api(`clientes?usuario_id=eq.${u.id}&select=*`);
        if (clientes.length) {
          STATE.cliente = clientes[0];
          STATE.suspended = await checkSuspension(clientes[0].id);
        }
      }
    }

    // Guardar sesión en localStorage
    localStorage.setItem('iallclub_session', JSON.stringify({user: STATE.user, cliente: STATE.cliente, suspended: STATE.suspended}));
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    const empresaNombre = STATE.cliente ? ` · ${STATE.cliente.empresa}` : '';
    document.getElementById('topbar-user').textContent = u.nombre + ' · ' + u.rol + empresaNombre;
    renderSidebar();
    renderPage('dashboard');
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
  } finally {
    btn.innerHTML = 'Ingresar';
    btn.disabled = false;
  }
}

async function checkSuspension(clienteId) {
  try {
    const pagos = await api(`pagos?cliente_id=eq.${clienteId}&pagado=eq.false&order=anio.desc,mes.desc&select=*`);
    return pagos.length >= 2;
  } catch { return false; }
}

function doLogout() {
  supabaseClient.auth.signOut();
  STATE = { user: null, cliente: null, page: 'dashboard', moduleOpen: null, suspended: false };
  localStorage.removeItem('iallclub_session');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
}

// ── SIDEBAR ──────────────────────────────────────────────
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const rol = STATE.user.rol;
  let html = '';
  if (rol === 'superadmin') {
    html += `<div class="sidebar-title">Administración</div>
    <div class="nav-item" onclick="renderPage('dashboard')"><span class="icon">📊</span>Dashboard</div>
    <div class="nav-item" onclick="renderPage('clientes')"><span class="icon">👥</span>Clientes</div>
    <div class="nav-item" onclick="renderPage('pagos')"><span class="icon">💳</span>Pagos</div>
    <div class="nav-item" onclick="renderPage('admins')"><span class="icon">🔐</span>Admins</div>
    <div class="nav-item" onclick="renderPage('subusuarios')"><span class="icon">👤</span>Sub-usuarios</div>
    <div class="nav-item" onclick="renderPage('backup')"><span class="icon">💾</span>Backup</div>`;
  } else if (rol === 'admin') {
    html += `<div class="sidebar-title">Mi Empresa</div>
    <div class="nav-item" onclick="renderPage('dashboard')"><span class="icon">🏠</span>Inicio</div>
    <div class="nav-item" onclick="renderPage('modulos')"><span class="icon">⚡</span>Módulos</div>
    <div class="nav-item" onclick="renderPage('subusuarios')"><span class="icon">👤</span>Usuarios</div>`;
  } else {
    html += `<div class="sidebar-title">Menú</div>
    <div class="nav-item" onclick="renderPage('dashboard')"><span class="icon">🏠</span>Inicio</div>
    <div class="nav-item" onclick="renderPage('modulos')"><span class="icon">⚡</span>Mis Módulos</div>`;
  }
  sb.innerHTML = html;
}

function setActive(page) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.remove('active');
    if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(`'${page}'`))
      el.classList.add('active');
  });
}

// ── PAGES ────────────────────────────────────────────────
async function renderPage(page) {
  STATE.page = page;
  STATE.moduleOpen = null;
  setActive(page);
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading">⏳ Cargando...</div>';
  try {
    const rol = STATE.user.rol;
    if (rol === 'superadmin') {
      if (page === 'dashboard')     await renderAdminDashboard();
      else if (page === 'clientes') await renderClientes();
      else if (page === 'pagos')    await renderPagos();
      else if (page === 'admins')   await renderAdmins();
      else if (page === 'subusuarios') await renderSubusuarios();
      else if (page === 'backup')   await renderBackup();
    } else if (rol === 'admin') {
      if (page === 'dashboard')     await renderClienteDashboard();
      else if (page === 'modulos')  await renderModulos();
      else if (page === 'subusuarios') await renderSubusuariosAdmin();
    } else {
      if (page === 'dashboard') await renderClienteDashboard();
      else if (page === 'modulos') await renderModulos();
    }
  } catch(e) {
    c.innerHTML = `<div class="empty">❌ Error cargando página: ${e.message}</div>`;
  }
}

// ── ADMIN DASHBOARD ──────────────────────────────────────
async function renderAdminDashboard() {
  const [clientes, pagos, modulos] = await Promise.all([
    api('clientes?select=*'),
    api('pagos?pagado=eq.false&select=*'),
    api('cliente_modulos?activo=eq.true&select=*')
  ]);
  let suspendidos = 0;
  for (const cl of clientes) {
    const p = await api(`pagos?cliente_id=eq.${cl.id}&pagado=eq.false&select=id`);
    if (p.length >= 2) suspendidos++;
  }
  document.getElementById('content').innerHTML = `
    <div class="page-title">Panel de Control</div>
    <div class="page-sub">Resumen general de iall Club</div>
    <div class="cards-grid">
      <div class="kpi-card"><div class="kpi-label">Clientes totales</div><div class="kpi-value cyan">${clientes.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Módulos activos</div><div class="kpi-value purple">${modulos.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Pagos pendientes</div><div class="kpi-value yellow">${pagos.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Suspendidos</div><div class="kpi-value red">${suspendidos}</div></div>
    </div>
    <p style="color:var(--text2);font-size:13px">Usá el menú lateral para gestionar clientes, pagos y administradores.</p>`;
}

// ── CLIENTES ─────────────────────────────────────────────
async function renderClientes() {
  const clientes = await api('clientes?select=*,usuarios!clientes_usuario_id_fkey(nombre,email,activo)');
  let rows = '';
  for (const cl of clientes) {
    const pagos = await api(`pagos?cliente_id=eq.${cl.id}&pagado=eq.false&select=id`);
    const susp = pagos.length >= 2;
    const u = cl.usuarios || {};
    rows += `<tr>
      <td>${u.nombre||'-'}</td>
      <td>${cl.empresa}</td>
      <td>${u.email||'-'}</td>
      <td><span class="badge ${susp?'red':'green'}">${susp?'Suspendido':'Activo'}</span></td>
      <td>
        <button class="action-btn edit" onclick="editCliente('${cl.id}')">Editar</button>
        <button class="action-btn edit" onclick="verModulos('${cl.id}','${cl.empresa}')">Módulos</button>
        <button class="action-btn pay" onclick="verStock('${cl.id}','${cl.empresa}')">📦 Stock</button>

      <table><thead><tr><th>Nombre</th><th>Empresa</th><th>Email</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="5" class="empty">Sin clientes aún</td></tr>'}</tbody></table>
    </div>`;
}

async function newCliente() {
  const mods = await api('modulos?activo=eq.true&select=*');

async function saveNewCliente() {
  const nombre  = document.getElementById('f-nombre').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const pass    = document.getElementById('f-pass').value.trim();
  const empresa = document.getElementById('f-empresa').value.trim();
  const tel     = document.getElementById('f-tel').value.trim();
  const errEl   = document.getElementById('modal-err');
  const btn     = document.getElementById('btn-guardar');

  errEl.textContent = '';
  if (!nombre||!email||!pass||!empresa) {
    errEl.textContent = 'Completá todos los campos obligatorios';
    return;
  }

  btn.innerHTML = '<span class="spinner"></span>Guardando...';
  btn.disabled = true;

  try {
    // 1. Crear usuario
    const usuarios = await api('usuarios?select=*', 'POST', {
      email, nombre, rol: 'cliente', activo: true, password_hash: pass
    });
    const u = usuarios[0];
    if (!u || !u.id) throw new Error('No se pudo crear el usuario');

    // 2. Crear cliente
    const clientes = await api('clientes?select=*', 'POST', {
      usuario_id: u.id, empresa, contacto: nombre, telefono: tel
    });
    const cl = clientes[0];
    if (!cl || !cl.id) throw new Error('No se pudo crear el cliente');

    // 3. Asignar módulos
    const checks = document.querySelectorAll('.modulos-check input:checked');
    for (const ch of checks) {
      await api('cliente_modulos', 'POST', {
        cliente_id: cl.id, modulo_id: ch.value, activo: true
      });
    }

    // 4. Crear pago del mes actual
    const now = new Date();
    await api('pagos', 'POST', {
      cliente_id: cl.id,
      mes: now.getMonth() + 1,
      anio: now.getFullYear(),
      pagado: false
    });

    closeModal();
    toast('✅ Cliente creado exitosamente');
    renderPage('clientes');
  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    btn.innerHTML = 'Guardar';
    btn.disabled = false;
  }
}

async function verModulos(clienteId, empresa) {
  const [todos, contratados] = await Promise.all([
    api('modulos?activo=eq.true&select=*'),

  showModal(`<h3>Módulos — ${empresa}</h3>
    <div class="modulos-check" style="margin-bottom:8px">${todos.map(m=>`<label class="mod-check">
      <input type="checkbox" value="${m.id}" ${contratadosIds.includes(m.id)?'checked':''}/> ${m.nombre}
    </label>`).join('')}</div>
    <div class="modal-actions">

      <button class="btn-save" onclick="saveModulos('${clienteId}')">Guardar</button>
    </div>`);
}

async function saveModulos(clienteId) {
  try {
    const checks = document.querySelectorAll('.modulos-check input');
    for (const ch of checks) {
      const exists = await api(`cliente_modulos?cliente_id=eq.${clienteId}&modulo_id=eq.${ch.value}&select=*`);
      if (ch.checked && !exists.length) {
        await api('cliente_modulos', 'POST', { cliente_id: clienteId, modulo_id: ch.value, activo: true });
      } else if (!ch.checked && exists.length) {
        await api(`cliente_modulos?id=eq.${exists[0].id}`, 'DELETE');
      }
    }
    closeModal();
    toast('✅ Módulos actualizados');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function delCliente(id) {
  if (!confirm('¿Eliminar este cliente? Se borrarán todos sus datos.')) return;
  try {
    const cl = await api(`clientes?id=eq.${id}&select=usuario_id`);
    await api(`cliente_modulos?cliente_id=eq.${id}`, 'DELETE');
    await api(`pagos?cliente_id=eq.${id}`, 'DELETE');
    await api(`clientes?id=eq.${id}`, 'DELETE');
    if (cl[0]) await api(`usuarios?id=eq.${cl[0].usuario_id}`, 'DELETE');
    toast('Cliente eliminado');
    renderPage('clientes');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ── PAGOS ────────────────────────────────────────────────
async function renderPagos() {
  const clientes = await api('clientes?select=*,usuarios!clientes_usuario_id_fkey(nombre,email)');
  let rows = '';
  for (const cl of clientes) {
    const pagos = await api(`pagos?cliente_id=eq.${cl.id}&order=anio.desc,mes.desc&select=*`);
    const pendientes = pagos.filter(p => !p.pagado).length;
    const susp = pendientes >= 2;
    for (const p of pagos.slice(0,3)) {
      rows += `<tr>
        <td>${cl.usuarios?.nombre||'-'}</td>
        <td>${cl.empresa}</td>
        <td>${p.mes}/${p.anio}</td>
        <td>${p.monto ? '$' + p.monto : '-'}</td>
        <td><span class="badge ${p.pagado?'green':'red'}">${p.pagado?'Pagado':'Pendiente'}</span></td>
        <td>${susp?'<span class="badge red">Suspendido</span>':''}</td>
        <td>${!p.pagado?`<button class="action-btn pay" onclick="marcarPagado('${p.id}')">✓ Pagado</button>`:''}</td>
      </tr>`;
    }
  }
  document.getElementById('content').innerHTML = `
    <div class="page-title">Pagos</div>
    <div class="page-sub">Control de pagos mensuales — suspensión automática a los 2 meses de deuda</div>
    <div style="margin-bottom:16px">
      <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="newPago()">+ Registrar pago</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr><th>Cliente</th><th>Empresa</th><th>Período</th><th>Monto</th><th>Estado</th><th>Suspensión</th><th>Acción</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="7" class="empty">Sin registros</td></tr>'}</tbody></table>
    </div>`;
}

async function saveSubusuario() {
  const nombre = document.getElementById('su-nombre').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass = document.getElementById('su-pass').value;
  const clienteId = document.getElementById('su-cliente').value;
  const checks = document.querySelectorAll('#su-modulos input:checked');
  const modulos = Array.from(checks).map(c => c.value);

  if (!nombre || !email || !pass || !clienteId) { toast('Completá todos los campos', 'error'); return; }
  if (!modulos.length) { toast('Seleccioná al menos un módulo', 'error'); return; }

  try {
    // 1. Crear en Supabase Auth
    const { data: authData, error: authError } = await supabaseClient.auth.admin 
      ? await supabaseClient.auth.admin.createUser({ email, password: pass, email_confirm: true })
      : { data: null, error: { message: 'Sin permisos admin' } };
    
    // 2. Crear en tabla usuarios (el trigger de Auth no aplica aquí)
    await api('usuarios?select=*', 'POST', {
      nombre, email,
      password_hash: pass,
      rol: 'cliente',
      activo: true,
      cliente_id: clienteId,
      modulos_habilitados: modulos
    });

    toast('✅ Sub-usuario creado');
    closeModal();
    renderPage('subusuarios');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
      <button class="backup-btn" onclick="doBackup('todo')">💾 Backup completo</button>
      <button class="backup-btn" onclick="doBackup('clientes')">👥 Solo clientes</button>
      <button class="backup-btn" onclick="doBackup('pagos')">💳 Solo pagos</button>
      <button class="backup-btn" onclick="doBackup('progreso')">📊 Solo progreso</button>
    </div>`;
}

async function doBackup(tipo) {
  try {
    let data = {};
    if (tipo === 'todo' || tipo === 'clientes') data.clientes = await api('clientes?select=*,usuarios!clientes_usuario_id_fkey(*)');
    if (tipo === 'todo' || tipo === 'pagos')    data.pagos    = await api('pagos?select=*');
    if (tipo === 'todo' || tipo === 'progreso') data.progreso = await api('progreso_modulo?select=*');
    if (tipo === 'todo') {
      data.usuarios = await api('usuarios?select=id,email,nombre,rol,activo,created_at');
      data.modulos  = await api('modulos?select=*');
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `iallclub_backup_${tipo}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast('✅ Backup descargado');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

const MODULE_ICONS  = { mantenimiento:'🔧', produccion:'🏭', comercial:'📈', camara:'📷', stock:'📦', calidad:'✅', fincas:'🌿' };

async function renderModulos() {
  if (STATE.suspended) { renderClienteDashboard(); return; }
  const [contratados, todos] = await Promise.all([
    api(`cliente_modulos?cliente_id=eq.${STATE.cliente.id}&activo=eq.true&select=*`),
    api('modulos?activo=eq.true&select=*')
  ]);
  const contratadosIds = contratados.map(c => c.modulo_id);

  // Filtrar por modulos_habilitados si es usuario (no superadmin ni admin)
  const modulosHabilitados = STATE.user.modulos_habilitados || null;

  // Módulos que se ocultan completamente si no están contratados (no muestran card bloqueada)
  const MODULOS_OCULTOS_SI_NO_CONTRATADO = ['fincas'];

  const cards = todos.map(m => {
    const contratado = contratadosIds.includes(m.id);
    // Si tiene restricción de módulos, verificar si está habilitado
    const habilitado = !modulosHabilitados || modulosHabilitados.includes(m.nombre);
    const locked = !contratado || !habilitado;

    // Ocultar completamente si no está contratado y es un módulo de ocultamiento
    if (locked && MODULOS_OCULTOS_SI_NO_CONTRATADO.includes(m.nombre)) return '';

    const svgIcon = getModuleIcon(m.nombre);
    const iconHtml = svgIcon
      ? `<div class="mod-icon-wrap">${svgIcon}</div>`
      : `<div class="module-icon">${MODULE_ICONS[m.nombre]||'⚡'}</div>`;
    const clickAttr = locked ? '' : ` onclick="openModule('${m.nombre}')"`;
    return `<div class="module-card ${locked?'locked':''}"${clickAttr}>
      ${iconHtml}
      <div class="module-name">${m.nombre.charAt(0).toUpperCase()+m.nombre.slice(1)} App</div>
      <div class="module-desc">${locked?'🔒 No contratado':m.descripcion||'Clic para acceder'}</div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="page-title">Mis Módulos</div>
    <div class="page-sub">Hacé clic en un módulo para abrirlo</div>
    <div class="modules-grid">${cards}</div>`;
}

// ── VER STOCK DE UN CLIENTE (vista admin) ──
async function verStock(clienteId, empresa) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading">⏳ Cargando stock...</div>';

  try {
    const [items, historial] = await Promise.all([
      api(`stock_items?cliente_id=eq.${clienteId}&order=producto.asc&select=*`),
      api(`stock_historial?cliente_id=eq.${clienteId}&order=created_at.desc&limit=50&select=*`)
    ]);

    // KPIs
    const totalItems = items.length;
    const totalUnidades = items.reduce((s, i) => s + i.cantidad, 0);
    const stockBajo = items.filter(i => i.cantidad <= 5 && i.cantidad > 0).length;
    const sinStock = items.filter(i => i.cantidad === 0).length;

    // Tabla de stock
    const rows = items.map(i => {
      const dot = i.cantidad === 0 ? 'red' : i.cantidad <= 5 ? 'yellow' : 'green';
      return `<tr>
        <td><span class="badge cyan">${i.codigo}</span></td>
        <td>${i.producto}</td>
        <td><span class="badge purple">${i.rack}</span></td>
        <td><strong style="color:var(--${dot})">${i.cantidad}</strong></td>
        <td style="font-size:11px;color:var(--text2)">${i.ultimo_mov||'-'}</td>
      </tr>`;
    }).join('');

    // Historial reciente
    const histRows = historial.slice(0,10).map(h => `
      <div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text2);min-width:130px">${h.fecha}</div>
        <div style="flex:1;font-size:13px">
          <span class="badge ${h.tipo==='ingreso'?'green':'red'}">${h.tipo}</span>
          &nbsp;<strong>${h.cantidad}×</strong> ${h.producto}
          <span class="badge purple" style="margin-left:6px">${h.rack}</span>
          <br><span style="font-size:11px;color:var(--text2)">${h.codigo} · Resp: ${h.responsable||'-'}${h.obs?' · '+h.obs:''}</span>
        </div>
      </div>`).join('');

    content.innerHTML = `
      <div class="module-back" onclick="renderPage('clientes')">← Volver a clientes</div>
      <div class="page-title">📦 Stock — ${empresa}</div>
      <div class="page-sub">Inventario en tiempo real desde Supabase</div>

      <div class="cards-grid" style="margin-bottom:24px">
        <div class="kpi-card"><div class="kpi-label">Productos</div><div class="kpi-value cyan">${totalItems}</div></div>
        <div class="kpi-card"><div class="kpi-label">Unidades totales</div><div class="kpi-value purple">${totalUnidades}</div></div>
        <div class="kpi-card"><div class="kpi-label">Stock bajo</div><div class="kpi-value yellow">${stockBajo}</div></div>
        <div class="kpi-card"><div class="kpi-label">Sin stock</div><div class="kpi-value red">${sinStock}</div></div>
      </div>

      <div class="table-wrap" style="margin-bottom:24px">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px">Stock actual</div>
        <table>
          <thead><tr><th>Código</th><th>Producto</th><th>Rack</th><th>Cantidad</th><th>Último mov.</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="5" class="empty">Sin productos cargados</td></tr>'}</tbody>
        </table>
      </div>

      <div class="table-wrap">
        <div style="padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px">Últimos 10 movimientos</div>
        <div style="padding:8px 16px">
          ${histRows || '<div class="empty">Sin movimientos registrados</div>'}
        </div>
      </div>`;

  } catch(e) {
    content.innerHTML = `<div class="empty">❌ Error cargando stock: ${e.message}</div>`;
  }
}

(function restoreSession() {
  try {
    const saved = localStorage.getItem('iallclub_session');
    if (!saved) return;
    const session = JSON.parse(saved);
    if (!session || !session.user || !session.user.id) return;

    STATE.user      = session.user;
    STATE.cliente   = session.cliente || null;
    STATE.suspended = session.suspended || false;

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topbar-user').textContent =
      session.user.nombre + ' · ' + session.user.rol;
    renderSidebar();
    renderPage('dashboard');
  } catch(e) {
    localStorage.removeItem('iallclub_session');
  }
})();

async function mantLoadData(clienteId) {
  try {
    const [solic, ords, equips] = await Promise.all([
      api(`mant_solicitudes?cliente_id=eq.${clienteId}&order=created_at.desc&select=*`),
      api(`mant_ordenes?cliente_id=eq.${clienteId}&order=created_at.desc&select=*`),
      api(`equipos?cliente_id=eq.${clienteId}&activo=eq.true&order=nombre.asc&select=*`)
    ]);
    mantSolicitudes = solic;
    mantOrdenes = ords;
    mantEquipos = equips;
    await mantLoadPlan(clienteId);
    await mantLoadPoems(clienteId);
    await mantCheckPlanVencimientos(clienteId);
    mantUpdateKPIs();
    mantRenderTab();
  } catch(e) {
    console.error('Error cargando mantenimiento:', e);
  }
}

let mantChartInstance = null;

function mantUpdateKPIs(filtradas) {
  const base = filtradas || mantSolicitudes;
  const sol = base.filter(s => s.estado === 'solicitada').length;
  const proc = base.filter(s => s.estado === 'en_proceso').length;
  const fin = base.filter(s => s.estado === 'finalizada').length;
  const urg = base.filter(s => s.urgencia === 'urgente' && s.estado !== 'finalizada').length;
  const interv = base.length;
  if(document.getElementById('kpi-sol')) document.getElementById('kpi-sol').textContent = sol;
  if(document.getElementById('kpi-proc')) document.getElementById('kpi-proc').textContent = proc;
  if(document.getElementById('kpi-fin')) document.getElementById('kpi-fin').textContent = fin;
  if(document.getElementById('kpi-urg')) document.getElementById('kpi-urg').textContent = urg;
  if(document.getElementById('kpi-interv')) document.getElementById('kpi-interv').textContent = interv;
  // Top 3 equipos
  const cuentas = {};
  base.forEach(s => {
    const key = s.equipo_nombre || s.equipo_numero || 'Sin equipo';
    cuentas[key] = (cuentas[key] || 0) + 1;
  });
  const top3 = Object.entries(cuentas).sort((a,b) => b[1]-a[1]).slice(0,3);
  const canvas = document.getElementById('kpi-chart-top3');
  if (!canvas || !top3.length) return;
  const ctx = canvas.getContext('2d');
  const S = canvas.width; // 80x80
  ctx.clearRect(0, 0, S, S);
  const total = top3.reduce((s, [,v]) => s + v, 0);
  const colors = ['#00d4ff','#8b5cf6','#10b981'];
  const cx = S/2, cy = S/2, r = S/2 - 5;
  let start = -Math.PI/2;
  top3.forEach(([label, val], i) => {
    const slice = (val/total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + slice);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    start += slice;
  });
  // Leyenda en div separado
  const legend = document.getElementById('kpi-chart-legend');
  if (legend) {
    legend.innerHTML = top3.map(([label, val], i) => {
      const short = label.length > 16 ? label.substring(0,16)+'…' : label;
      return `<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
        <span style="width:8px;height:8px;border-radius:50%;background:${colors[i]};flex-shrink:0;display:inline-block"></span>
        <span style="color:#94a3b8;font-size:10px">${short}</span>
        <span style="color:#e2e8f0;font-weight:700;font-size:10px;margin-left:auto">${val}</span>
      </div>`;
    }).join('');
  }
}

function mantAplicarFiltros(lista) {
  return lista.filter(s => {
    if (mantFiltros.desde && new Date(s.created_at) < new Date(mantFiltros.desde)) return false;
    if (mantFiltros.hasta && new Date(s.created_at) > new Date(mantFiltros.hasta + 'T23:59:59')) return false;
    if (mantFiltros.urgencia !== 'todos' && s.urgencia !== mantFiltros.urgencia) return false;
    if (mantFiltros.sector !== 'todos' && s.sector !== mantFiltros.sector) return false;
    if (mantFiltros.tipo !== 'todos' && (s.tipo || 'correctivo') !== mantFiltros.tipo) return false;
    return true;
  });
}

.prod-tabs { display:flex; gap:4px; background:var(--bg2); padding:4px; border-radius:10px; margin-bottom:20px; width:fit-content; }
.prod-tab { padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text2); transition:.2s; border:none; background:transparent; font-family:'DM Sans',sans-serif; }
.prod-tab.active { background:var(--card); color:#00d4ff; }

/* Tabla registros */
.prod-table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.prod-toolbar { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.prod-search { flex:1; max-width:250px; padding:8px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
.prod-search:focus { border-color:#00d4ff; }

/* Eficiencia badge */
.ef-alta { background:rgba(16,185,129,.15); color:#10b981; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
.ef-media { background:rgba(245,158,11,.15); color:#f59e0b; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }
.ef-baja { background:rgba(239,68,68,.15); color:#ef4444; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:700; }

/* Tarjetas de línea */
.prod-lineas-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
.prod-linea-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; transition:.2s; }
.prod-linea-card:hover { border-color:#8b5cf6; transform:translateY(-2px); }

/* Modal */
.prod-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:2000; align-items:center; justify-content:center; }
.prod-modal.open { display:flex; }
.prod-modal-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; width:640px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.prod-modal-title { font-size:16px; font-weight:700; margin-bottom:20px; font-family:'Syne',sans-serif; display:flex; align-items:center; justify-content:space-between; }
.prod-close { cursor:pointer; color:var(--text2); font-size:20px; background:none; border:none; }
.prod-close:hover { color:#ef4444; }
.prod-field { margin-bottom:14px; }
.prod-field label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:4px; }
.prod-input { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; transition:.2s; font-family:'DM Sans',sans-serif; }
.prod-input:focus { border-color:#8b5cf6; }
.prod-textarea { min-height:70px; resize:vertical; }
.prod-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.prod-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.prod-modal-actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.prod-section { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin:20px 0 12px; padding-top:16px; border-top:1px solid var(--border); }

/* Paradas */
.prod-parada-item { background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.prod-parada-desc { flex:1; font-size:13px; }
.prod-parada-tiempo { font-size:12px; color:#f59e0b; font-family:monospace; }
.prod-parada-tipo { font-size:10px; color:var(--text2); text-transform:uppercase; }

/* Eficiencia visual */
.prod-ef-bar { height:6px; background:var(--border); border-radius:3px; margin-top:6px; overflow:hidden; }
.prod-ef-fill { height:100%; border-radius:3px; transition:.3s; }

// MÓDULO PLAN DE MANTENIMIENTO PREVENTIVO
// ══════════════════════════════════════════════════════

let mantPlan = []; // registros en Supabase tabla mant_plan

async function mantLoadPlan(clienteId) {
  try {
    mantPlan = await api(`mant_plan?cliente_id=eq.${clienteId}&order=fecha_programada.asc&select=*`);
  } catch(e) { mantPlan = []; }
}

// ── MÓDULO POEM ──
let mantPoems = [];

async function mantLoadPoems(clienteId) {
  try {
    mantPoems = await api(`mant_poems?cliente_id=eq.${clienteId}&order=codigo.asc&select=*`);
  } catch(e) { mantPoems = []; }
}

function mantRenderPoems() {
  const cards = mantPoems.length ? mantPoems.map(p => `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;transition:.2s" onmouseover="this.style.borderColor='#00d4ff'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="background:rgba(0,212,255,.1);border-radius:10px;padding:12px;font-size:22px;flex-shrink:0">📄</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:11px;color:var(--text2);font-family:monospace;margin-bottom:3px">${p.codigo}</div>
        <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.titulo}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <a href="${p.url}" target="_blank" style="text-decoration:none">
          <button class="mant-btn primary" style="padding:7px 14px;font-size:12px">🔗 Ver</button>
        </a>
        <button class="mant-btn danger" style="padding:7px 10px;font-size:12px" onclick="mantEliminarPoem('${p.id}')">🗑️</button>
      </div>
    </div>`).join('')
    : `<div style="background:var(--bg2);border:1px dashed var(--border);border-radius:12px;padding:50px;text-align:center">
        <div style="font-size:40px;margin-bottom:12px">📄</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px">Sin POEM cargados</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:20px">Agregá los Procedimientos Operativos de Mantenimiento</div>
        <button class="mant-btn primary" onclick="mantAgregarPoem()">+ Agregar POEM</button>

// Verificar y crear solicitudes preventivas que vencen en 30 días
async function mantCheckPlanVencimientos(clienteId) {
  const hoy = new Date();
  const en30 = new Date(); en30.setDate(en30.getDate() + 30);
  const pendientes = mantPlan.filter(p => {
    if (p.solicitud_creada) return false;
    const fecha = new Date(p.fecha_programada);
    return fecha >= hoy && fecha <= en30;
  });

  for (const p of pendientes) {
    try {
      const totalSols = mantSolicitudes.length + 1;
      const codigo = 'SOL-MA-' + String(totalSols).padStart(4, '0');
      const diasRestantes = Math.ceil((new Date(p.fecha_programada) - hoy) / (1000*60*60*24));
      const [sol] = await api('mant_solicitudes?select=*', 'POST', {
        cliente_id: clienteId,
        codigo,
        equipo_nombre: p.equipo_nombre,
        equipo_numero: p.equipo_numero || '0',
        sector: p.sector || '',
        solicitante: 'Sistema — Plan Preventivo',
        urgencia: diasRestantes <= 7 ? 'urgente' : 'normal',
        descripcion: `[PLAN PREVENTIVO] ${p.tarea} — Programado para: ${new Date(p.fecha_programada).toLocaleDateString('es-AR')}`,
        estado: 'solicitada',
        tipo: 'preventivo'
      });
      // Marcar como creada en el plan
      await api(`mant_plan?id=eq.${p.id}`, 'PATCH', { solicitud_creada: true, solicitud_id: sol.id });
    } catch(e) { console.warn('Error creando solicitud preventiva:', e); }
  }
}

async function mantProcesarImportPlan() {
  const fileInput = document.getElementById('plan-file-input');
  if (!fileInput.files.length) { toast('Seleccioná un archivo', 'error'); return; }
  const file = fileInput.files[0];
  const clienteId = STATE.cliente.id;

  try {
    // Usar SheetJS para leer Excel/CSV
    const XLSX = await import('https://cdn.sheetjs.com/xlsx-0.20.0/package/xlsx.mjs');
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    // Saltear header si la primera fila no tiene fecha válida
    const startRow = rows[0] && isNaN(Date.parse(rows[0][0])) ? 1 : 0;
    const items = rows.slice(startRow).filter(r => r[0] && r[1]);

    if (!items.length) { toast('No se encontraron filas válidas', 'error'); return; }

    let ok = 0;
    for (const row of items) {
      const [fecha, equipo_nombre, equipo_numero, sector, tarea, frecuencia] = row.map(c => String(c).trim());
      if (!fecha || !equipo_nombre || !tarea) continue;
      try {
        await api('mant_plan?select=*', 'POST', {
          cliente_id: clienteId,
          fecha_programada: fecha,
          equipo_nombre,
          equipo_numero: equipo_numero || '0',
          sector: sector || '',
          tarea,
          frecuencia: frecuencia || '',
          solicitud_creada: false
        });
        ok++;
      } catch(e) {}
    }

    toast(`✅ ${ok} tareas importadas`);
    mantCloseModal();
    await mantLoadPlan(clienteId);
    await mantLoadPoems(clienteId);
    await mantCheckPlanVencimientos(clienteId);
    await mantLoadData(clienteId);
    mantSetTab('plan');
  } catch(e) {
    toast('Error al leer el archivo: ' + e.message, 'error');
  }
}

// ── ANÁLISIS IA ──
// ══════════════════════════════════════════════════════
// ANÁLISIS IA — MANTENIMIENTO (Global + por Equipo)
// ══════════════════════════════════════════════════════

function mantCalcularTiempos() {
  const tiempos = [];
  const finalizadas = mantSolicitudes.filter(s => s.estado === 'finalizada');
  for (const s of finalizadas) {
    const orden = mantOrdenes.find(o => o.solicitud_id === s.id);
    if (!orden) continue;
    const fechaSol = new Date(s.created_at);
    const fechaOT = new Date(orden.created_at);
    const fechaCierre = orden.fecha_cierre ? new Date(orden.fecha_cierre) : null;
    const diasSolOT = Math.round((fechaOT - fechaSol) / (1000*60*60*24));
    const diasTotal = fechaCierre ? Math.round((fechaCierre - fechaSol) / (1000*60*60*24)) : null;
    tiempos.push({ codigo: s.codigo, equipo: s.equipo_nombre + ' #' + s.equipo_numero, urgencia: s.urgencia, tipo: s.tipo || 'correctivo', diasSolOT, diasTotal });
  }
  const avgSolOT = tiempos.length ? Math.round(tiempos.reduce((a,t) => a + t.diasSolOT, 0) / tiempos.length) : 0;
  const conCierre = tiempos.filter(t => t.diasTotal !== null);
  const avgTotal = conCierre.length ? Math.round(conCierre.reduce((a,t) => a + t.diasTotal, 0) / conCierre.length) : 0;
  const eficiencia = conCierre.length ? Math.round((conCierre.filter(t => t.diasTotal <= 3).length / conCierre.length) * 100) : 0;
  return { tiempos, avgSolOT, avgTotal, eficiencia, totalFinalizadas: finalizadas.length };
}

function mantBuildResumenGlobal() {
  const tc = mantCalcularTiempos();
  const fallas = mantSolicitudes.reduce((acc, s) => {
    const key = s.equipo_nombre + ' #' + s.equipo_numero;
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
  const topEquipos = Object.entries(fallas).sort((a,b) => b[1]-a[1]).slice(0,5).map(([eq, n]) => ({ equipo: eq, intervenciones: n }));
  const tipoFallas = mantSolicitudes.reduce((acc, s) => {
    const p = s.descripcion.toLowerCase();
    if (p.includes('fuga') || p.includes('derrame')) acc['Fugas/derrames'] = (acc['Fugas/derrames']||0)+1;
    else if (p.includes('ruido') || p.includes('vibr')) acc['Ruidos/vibraciones'] = (acc['Ruidos/vibraciones']||0)+1;
    else if (p.includes('temperatura') || p.includes('frio') || p.includes('calor')) acc['Temperatura'] = (acc['Temperatura']||0)+1;
    else if (p.includes('electr') || p.includes('motor')) acc['Eléctrico/motor'] = (acc['Eléctrico/motor']||0)+1;
    else acc['Otros'] = (acc['Otros']||0)+1;
    return acc;
  }, {});
  return {
    empresa: STATE.cliente?.empresa || '',
    fecha_analisis: new Date().toLocaleDateString('es-AR'),
    resumen: {
      total_solicitudes: mantSolicitudes.length,
      solicitadas: mantSolicitudes.filter(s => s.estado === 'solicitada').length,
      en_proceso: mantSolicitudes.filter(s => s.estado === 'en_proceso').length,
      finalizadas: tc.totalFinalizadas,
      urgentes_pendientes: mantSolicitudes.filter(s => s.urgencia === 'urgente' && s.estado !== 'finalizada').length,
      correctivas: mantSolicitudes.filter(s => (s.tipo||'correctivo') === 'correctivo').length,
      preventivas: mantSolicitudes.filter(s => s.tipo === 'preventivo').length,
    },
    eficiencia: { porcentaje: tc.eficiencia, promedio_dias_sol_a_OT: tc.avgSolOT, promedio_dias_total_resolucion: tc.avgTotal, detalle_tiempos: tc.tiempos.slice(0,10) },
    equipos_criticos: topEquipos,
    tipos_fallas: tipoFallas,
    solicitudes_urgentes_abiertas: mantSolicitudes.filter(s => s.urgencia === 'urgente' && s.estado !== 'finalizada').map(s => ({ codigo: s.codigo, equipo: s.equipo_nombre, descripcion: s.descripcion.substring(0,80), fecha: s.created_at }))
  };
}

function mantBuildResumenEquipo(equipoId) {
  const equipo = mantEquipos.find(e => e.id === equipoId);
  if (!equipo) return null;
  const intervenciones = mantSolicitudes.filter(s => s.equipo_nombre === equipo.nombre && s.equipo_numero == equipo.numero);
  const tc = { tiempos: [], avgSolOT: 0, avgTotal: 0, eficiencia: 0 };
  for (const s of intervenciones.filter(x => x.estado === 'finalizada')) {
    const orden = mantOrdenes.find(o => o.solicitud_id === s.id);
    if (!orden) continue;
    const diasSolOT = Math.round((new Date(orden.created_at) - new Date(s.created_at)) / (1000*60*60*24));
    const diasTotal = orden.fecha_cierre ? Math.round((new Date(orden.fecha_cierre) - new Date(s.created_at)) / (1000*60*60*24)) : null;
    tc.tiempos.push({ codigo: s.codigo, urgencia: s.urgencia, diasSolOT, diasTotal });
  }
  if (tc.tiempos.length) {
    tc.avgSolOT = Math.round(tc.tiempos.reduce((a,t) => a+t.diasSolOT,0)/tc.tiempos.length);
    const conCierre = tc.tiempos.filter(t => t.diasTotal !== null);
    if (conCierre.length) { tc.avgTotal = Math.round(conCierre.reduce((a,t) => a+t.diasTotal,0)/conCierre.length); tc.eficiencia = Math.round((conCierre.filter(t => t.diasTotal<=3).length/conCierre.length)*100); }
  }
  return {
    equipo: equipo.nombre + ' #' + equipo.numero, sector: equipo.sector, empresa: STATE.cliente?.empresa || '',
    fecha_analisis: new Date().toLocaleDateString('es-AR'),
    total_intervenciones: intervenciones.length,
    finalizadas: intervenciones.filter(s => s.estado === 'finalizada').length,
    en_proceso: intervenciones.filter(s => s.estado === 'en_proceso').length,
    urgentes_pendientes: intervenciones.filter(s => s.urgencia === 'urgente' && s.estado !== 'finalizada').length,
    eficiencia: tc,
    historial: intervenciones.slice(0,15).map(s => ({ fecha: new Date(s.created_at).toLocaleDateString('es-AR'), codigo: s.codigo, tipo: s.tipo||'correctivo', urgencia: s.urgencia, descripcion: s.descripcion.substring(0,100), estado: s.estado }))
  };
}

  document.getElementById('mant-modal-body').innerHTML = `
    <div class="mant-modal-title">
      <span>🤖 ${titulo}</span>
      <button class="mant-close" onclick="mantCloseModal()">✕</button>
    </div>
    <div id="ia-loading" style="display:flex;align-items:center;gap:12px;padding:30px;color:var(--text2)">
      <div class="mant-spinner"></div> <span>${loadingText}</span>
    </div>
    <div id="ia-resultado" style="display:none"></div>`;
  modal.classList.add('open');
}

function mantMostrarResultadoIA(textoIA, titulo, subtitulo) {
  document.getElementById('ia-loading').style.display = 'none';
  const res = document.getElementById('ia-resultado');
  const html = textoIA
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/^#{1,3}\s+(.+)$/gm, '<div style="font-size:15px;font-weight:700;color:#00d4ff;margin:16px 0 8px">$1</div>')
    .replace(/^[-•]\s+(.+)$/gm, '<div style="padding:4px 0 4px 16px;border-left:2px solid rgba(0,212,255,.3);margin:4px 0;font-size:13px">$1</div>')
    .replace(/\n\n/g, '<br>').replace(/\n/g, '<br>');
  res.style.display = 'block';
  res.innerHTML = `
    <div style="font-size:13px;line-height:1.7;color:var(--text)">${html}</div>
    <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end">
      <button class="mant-btn primary" onclick="mantDescargarPDFIA(decodeURIComponent('${titulo}'), decodeURIComponent('${subtitulo}'))">📥 Descargar PDF</button>
      <button class="mant-btn secondary" onclick="mantCloseModal()">Cerrar</button>
    </div>`;
  window._iaTextoActual = textoIA;
}

// ══════════════════════════════════════════════════════
// MÓDULO CÁMARA — CONTROL DE TEMPERATURAS
// ══════════════════════════════════════════════════════

const TEMP_LIMITES = {
  heladera:        { max: 5,   min: null, label: '≤ 5°C',   icon: '🧊' },
  camara_verduras: { max: 8,   min: null, label: '≤ 8°C',   icon: '🥦' },
  freezer:         { max: null, min: -18, label: '≤ -18°C', icon: '❄️' }
};

const TEMP_NOMBRES = {
  heladera: 'Heladera / Cámara frigorífica',
  camara_verduras: 'Cámara de verduras',
  freezer: 'Freezer / Cámara congelados'
};

let tempTab = 'dashboard';
let tempUnidades = [];
let tempRegistros = [];

function tempEsAlerta(temperatura, tipo) {
  const lim = TEMP_LIMITES[tipo];
  if (!lim) return false;
  if (lim.max !== null && temperatura > lim.max) return true;
  if (lim.min !== null && temperatura > lim.min) return true;
  return false;
}
