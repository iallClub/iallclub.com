<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cámara App — iall Club</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&family=DM+Mono&display=swap"/>
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:    #0a0e1a;
    --bg2:   #0f1525;
    --bg3:   #151c30;
    --card:  #111827;
    --border:#1e293b;
    --text:  #e2e8f0;
    --text2: #64748b;
    --cyan:  #00d4ff;
  }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:20px; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:10px;
    font-size:13px; font-weight:600; opacity:0; pointer-events:none;
    transition:.3s; z-index:9999; max-width:320px;
    background:rgba(16,185,129,.15); border:1px solid #10b981; color:#10b981;
  }
  #toast.show { opacity:1; }
  #toast.error { background:rgba(239,68,68,.15); border-color:#ef4444; color:#ef4444; }

  /* ── SPINNER ── */
  .mant-spinner {
    width:16px; height:16px; border:2px solid rgba(0,212,255,.3);
    border-top-color:#00d4ff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── CÁMARA / TEMPERATURAS MODULE ── */
  .temp-wrap { padding: 0; }
  .temp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .temp-title { font-size:20px; font-weight:700; font-family:'Syne',sans-serif; }
  .temp-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .temp-btn {
    padding:8px 16px; border-radius:8px; border:none; cursor:pointer;
    font-size:13px; font-weight:600; transition:.2s; font-family:'DM Sans',sans-serif;
  }
  .temp-btn.primary { background:linear-gradient(135deg,#00f5c4,#0099ff); color:#000; }
  .temp-btn.secondary { background:rgba(0,212,255,.1); color:#00d4ff; border:1px solid rgba(0,212,255,.3); }
  .temp-btn.danger { background:rgba(239,68,68,.1); color:#ef4444; border:1px solid rgba(239,68,68,.3); }
  .temp-btn.excel { background:rgba(16,185,129,.1); color:#10b981; border:1px solid rgba(16,185,129,.3); }
  .temp-btn.ai { background:linear-gradient(135deg,#8b5cf6,#00d4ff); color:#fff; }
  .temp-btn:hover { opacity:.8; transform:translateY(-1px); }

  /* KPIs */
  .temp-kpis { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-bottom:24px; }
  .temp-kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; text-align:center; }
  .temp-kpi-label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .temp-kpi-val { font-size:28px; font-weight:800; }
  .temp-kpi-val.ok { color:#10b981; }
  .temp-kpi-val.alert { color:#ef4444; }
  .temp-kpi-val.cyan { color:#00d4ff; }
  .temp-kpi-val.yellow { color:#f59e0b; }

  /* Tabs */
  .temp-tabs { display:flex; gap:4px; background:var(--bg2); padding:4px; border-radius:10px; margin-bottom:20px; width:fit-content; }
  .temp-tab { padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--text2); transition:.2s; border:none; background:transparent; font-family:'DM Sans',sans-serif; }
  .temp-tab.active { background:var(--card); color:#00d4ff; }

  /* Grid de unidades */
  .temp-unidades-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; margin-bottom:24px; }
  .temp-unidad-card {
    background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px;
    transition:.2s; cursor:pointer;
  }
  .temp-unidad-card:hover { border-color:#00d4ff; transform:translateY(-2px); }
  .temp-unidad-card.alerta { border-color:#ef4444; background:rgba(239,68,68,.05); }
  .temp-unidad-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .temp-unidad-icon { font-size:28px; }
  .temp-unidad-tipo { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; }
  .temp-unidad-nombre { font-size:15px; font-weight:700; margin-bottom:4px; }
  .temp-unidad-ubicacion { font-size:12px; color:var(--text2); margin-bottom:10px; }
  .temp-unidad-temp {
    font-size:32px; font-weight:800; font-family:monospace;
    display:flex; align-items:baseline; gap:6px;
  }
  .temp-unidad-temp .unit { font-size:14px; font-weight:400; color:var(--text2); }
  .temp-unidad-footer { display:flex; justify-content:space-between; margin-top:10px; font-size:11px; color:var(--text2); }
  .temp-badge-ok { background:rgba(16,185,129,.15); color:#10b981; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
  .temp-badge-alert { background:rgba(239,68,68,.15); color:#ef4444; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:700; }
  .temp-badge-nodata { background:rgba(148,163,184,.15); color:var(--text2); padding:2px 8px; border-radius:20px; font-size:10px; }

  /* Tabla registros */
  .temp-table-wrap { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  .temp-toolbar { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .temp-search { flex:1; max-width:250px; padding:8px 12px; background:var(--bg3); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:13px; outline:none; }
  .temp-search:focus { border-color:#00d4ff; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); font-size:13px; }
  th { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; background:var(--bg2); }
  .temp-tr-alert td { background:rgba(239,68,68,.05) !important; }
  .temp-temp-ok { color:#10b981; font-weight:700; }
  .temp-temp-alert { color:#ef4444; font-weight:700; }
  .empty { text-align:center; padding:40px; color:var(--text2); }

  /* Botones de fila */
  .row-actions { display:flex; gap:5px; }
  .btn-row {
    padding:3px 9px; border-radius:6px; border:none; cursor:pointer;
    font-size:11px; font-weight:600; transition:.15s; font-family:'DM Sans',sans-serif;
  }
  .btn-row.edit { background:rgba(0,212,255,.12); color:#00d4ff; border:1px solid rgba(0,212,255,.3); }
  .btn-row.del  { background:rgba(239,68,68,.12);  color:#ef4444;  border:1px solid rgba(239,68,68,.3); }
  .btn-row:hover { opacity:.75; transform:translateY(-1px); }

  /* Modal */
  .temp-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:2000; align-items:center; justify-content:center; }
  .temp-modal.open { display:flex; }
  .temp-modal-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; width:520px; max-width:95vw; max-height:90vh; overflow-y:auto; }
  .temp-modal-title { font-size:16px; font-weight:700; margin-bottom:20px; font-family:'Syne',sans-serif; display:flex; align-items:center; justify-content:space-between; }
  .temp-close { cursor:pointer; color:var(--text2); font-size:20px; background:none; border:none; }
  .temp-close:hover { color:#ef4444; }
  .temp-field { margin-bottom:14px; }
  .temp-field label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:4px; }
  .temp-input {
    width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-size:13px; outline:none; transition:.2s; font-family:'DM Sans',sans-serif;
  }
  .temp-input:focus { border-color:#00d4ff; }
  .temp-modal-actions { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }

  /* AI Panel */
  .temp-ai-panel {
    background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(0,212,255,.1));
    border:1px solid rgba(139,92,246,.3); border-radius:12px; padding:20px; margin-top:20px;
  }
  .temp-ai-response { font-size:13px; line-height:1.7; white-space:pre-wrap; margin-top:12px; }
  .temp-ai-loading { display:flex; align-items:center; gap:8px; color:var(--text2); font-size:13px; }

  /* Responsive */
  @media (max-width: 768px) {
    .temp-kpis { grid-template-columns: repeat(2, 1fr) !important; }
    .temp-unidades-grid { grid-template-columns: 1fr !important; }
    .temp-header { flex-direction: column; align-items: flex-start; }
    .temp-actions { width: 100%; }
    .temp-btn { font-size: 12px !important; padding: 7px 12px !important; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<div class="temp-wrap">
  <div class="temp-header">
    <div class="temp-title">❄️ Control de Temperaturas</div>
    <div class="temp-actions">
      <button class="temp-btn primary" onclick="tempNuevoRegistro()">+ Registrar temperatura</button>
      <button class="temp-btn secondary" onclick="tempNuevaUnidad()">⚙️ Nueva unidad</button>
      <button class="temp-btn excel" onclick="tempExportarExcel()">⬇ Exportar Excel</button>
      <button class="temp-btn ai" onclick="tempAnalisisIA()">🤖 Análisis IA</button>
    </div>
  </div>

  <div class="temp-kpis" id="temp-kpis">
    <div class="temp-kpi"><div class="temp-kpi-label">Unidades</div><div class="temp-kpi-val cyan" id="tkpi-unidades">—</div></div>
    <div class="temp-kpi"><div class="temp-kpi-label">Registros hoy</div><div class="temp-kpi-val cyan" id="tkpi-hoy">—</div></div>
    <div class="temp-kpi"><div class="temp-kpi-label">Alertas hoy</div><div class="temp-kpi-val alert" id="tkpi-alertas">—</div></div>
    <div class="temp-kpi"><div class="temp-kpi-label">Total registros</div><div class="temp-kpi-val yellow" id="tkpi-total">—</div></div>
  </div>

  <div class="temp-tabs">
    <button class="temp-tab active" id="ttab-dashboard" onclick="tempSetTab('dashboard')">📊 Dashboard</button>
    <button class="temp-tab" id="ttab-registros" onclick="tempSetTab('registros')">📋 Registros</button>
  </div>

  <div id="temp-tab-content"></div>
</div>

<div class="temp-modal" id="temp-modal">
  <div class="temp-modal-box" id="temp-modal-body"></div>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────
const SUPA_URL = 'https://smldkvlmmzlgpxrtfesz.supabase.co';
const SUPA_KEY = 'sb_publishable_HGeSd7TgEqn53VUrltY-Tg_OW_ERXQ8';
const clienteId = new URLSearchParams(window.location.search).get('cid');

if (!clienteId) {
  document.body.innerHTML = '<div style="color:#ef4444;padding:40px;text-align:center">Error: cliente no especificado (falta ?cid=)</div>';
}

async function api(path, method = 'GET', body = null) {
  try {
    const opts = {
      method,
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${SUPA_KEY}`,
        'Prefer': 'return=representation'
      }
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || e.details || r.status); }
    const txt = await r.text();
    return txt ? JSON.parse(txt) : [];
  } catch(e) { console.error('API error:', e); throw e; }
}

function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3500);
}

// ── CONSTANTES ────────────────────────────────────────────
const TEMP_LIMITES = {
  heladera:        { max: 5,    min: null, label: '≤ 5°C',   icon: '🧊' },
  camara_verduras: { max: 8,    min: null, label: '≤ 8°C',   icon: '🥦' },
  freezer:         { max: null, min: -18,  label: '≤ -18°C', icon: '❄️' }
};
const TEMP_NOMBRES = {
  heladera:        'Heladera / Cámara frigorífica',
  camara_verduras: 'Cámara de verduras',
  freezer:         'Freezer / Cámara congelados'
};

let tempTab       = 'dashboard';
let tempUnidades  = [];
let tempRegistros = [];

// ── HELPERS ───────────────────────────────────────────────
function tempEsAlerta(temperatura, tipo) {
  const lim = TEMP_LIMITES[tipo];
  if (!lim) return false;
  if (lim.max !== null && temperatura > lim.max) return true;
  if (lim.min !== null && temperatura > lim.min) return true;
  return false;
}

// ── CARGA DE DATOS ────────────────────────────────────────
async function tempLoadData() {
  try {
    const hoy = new Date().toISOString().slice(0,10);
    const [unids, regs] = await Promise.all([
      api(`temp_unidades?cliente_id=eq.${clienteId}&activo=eq.true&order=nombre.asc&select=*`),
      api(`temp_registros?cliente_id=eq.${clienteId}&order=fecha.desc,hora.desc&limit=500&select=*`)
    ]);
    tempUnidades  = unids;
    tempRegistros = regs;
    tempUpdateKPIs(hoy);
    tempRenderTab();
  } catch(e) { console.error('Error cargando temperaturas:', e); }
}

function tempUpdateKPIs(hoy) {
  const hoyStr    = hoy || new Date().toISOString().slice(0,10);
  const regsHoy   = tempRegistros.filter(r => r.fecha === hoyStr);
  const alertasHoy = regsHoy.filter(r => r.alerta);
  const ku = document.getElementById('tkpi-unidades');
  const kh = document.getElementById('tkpi-hoy');
  const ka = document.getElementById('tkpi-alertas');
  const kt = document.getElementById('tkpi-total');
  if(ku) ku.textContent = tempUnidades.length;
  if(kh) kh.textContent = regsHoy.length;
  if(ka) ka.textContent = alertasHoy.length;
  if(kt) kt.textContent = tempRegistros.length;
}

// ── TABS ──────────────────────────────────────────────────
function tempSetTab(tab) {
  tempTab = tab;
  document.querySelectorAll('.temp-tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('ttab-' + tab);
  if(el) el.classList.add('active');
  tempRenderTab();
}
function tempRenderTab() {
  if(tempTab === 'dashboard') tempRenderDashboard();
  else if(tempTab === 'registros') tempRenderRegistros();
}

// ── DASHBOARD ─────────────────────────────────────────────
function tempRenderDashboard() {
  if (!tempUnidades.length) {
    document.getElementById('temp-tab-content').innerHTML = `
      <div style="text-align:center;padding:60px;color:var(--text2)">
        <div style="font-size:48px;margin-bottom:16px">❄️</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px">Sin unidades registradas</div>
        <div style="font-size:13px;margin-bottom:20px">Agregá tu primera unidad de frío para empezar</div>
        <button class="temp-btn primary" onclick="tempNuevaUnidad()">⚙️ Agregar unidad</button>
      </div>`;
    return;
  }

  const cards = tempUnidades.map(u => {
    const ultimo  = tempRegistros.find(r => r.unidad_id === u.id);
    const lim     = TEMP_LIMITES[u.tipo];
    const icon    = lim ? lim.icon : '🌡️';
    const limLabel = lim ? lim.label : '—';

    let tempDisplay = '<span style="color:var(--text2);font-size:16px">Sin datos</span>';
    let badge       = '<span class="temp-badge-nodata">Sin datos</span>';
    let cardClass   = '';

    if (ultimo) {
      const esAlerta = tempEsAlerta(parseFloat(ultimo.temperatura), u.tipo);
      const color    = esAlerta ? '#ef4444' : '#10b981';
      tempDisplay    = `<span style="color:${color}">${ultimo.temperatura}</span><span class="unit">°C</span>`;
      badge = esAlerta
        ? '<span class="temp-badge-alert">⚠️ FUERA DE RANGO</span>'
        : '<span class="temp-badge-ok">✅ Normal</span>';
      if(esAlerta) cardClass = 'alerta';
    }

    return `<div class="temp-unidad-card ${cardClass}" onclick="tempVerUnidad('${u.id}')">
      <div class="temp-unidad-header">
        <span class="temp-unidad-icon">${icon}</span>
        <span class="temp-unidad-tipo">${TEMP_NOMBRES[u.tipo] || u.tipo}</span>
      </div>
      <div class="temp-unidad-nombre">${u.nombre}</div>
      <div class="temp-unidad-ubicacion">📍 ${u.ubicacion || 'Sin ubicación'}</div>
      <div class="temp-unidad-temp">${tempDisplay}</div>
      <div class="temp-unidad-footer">
        <span>Límite: ${limLabel}</span>
        ${badge}
      </div>
    </div>`;
  }).join('');

  document.getElementById('temp-tab-content').innerHTML = `<div class="temp-unidades-grid">${cards}</div>`;
}

// ── REGISTROS ─────────────────────────────────────────────
function tempRenderRegistros() {
  const rows = tempRegistros.map(r => tempRenderRow(r)).join('');

  document.getElementById('temp-tab-content').innerHTML = `
    <div class="temp-table-wrap">
      <div class="temp-toolbar">
        <input class="temp-search" id="temp-search" placeholder="Buscar por unidad, responsable..." oninput="tempFiltrarRegistros()"/>
        <select class="temp-input" id="temp-filtro-alerta" onchange="tempFiltrarRegistros()" style="width:auto;padding:8px 12px">
          <option value="todos">Todos</option>
          <option value="alertas">Solo alertas</option>
          <option value="ok">Solo normales</option>
        </select>
      </div>
      <table>
        <thead><tr>
          <th>Fecha</th><th>Hora</th><th>Unidad</th><th>Tipo</th><th>Central</th>
          <th>Temperatura</th><th>Responsable</th><th>Observaciones</th><th>Acciones</th>
        </tr></thead>
        <tbody id="temp-tbody">${rows || '<tr><td colspan="9" class="empty">Sin registros</td></tr>'}</tbody>
      </table>
    </div>`;
}

function tempFiltrarRegistros() {
  const q      = (document.getElementById('temp-search')?.value || '').toLowerCase();
  const filtro = document.getElementById('temp-filtro-alerta')?.value || 'todos';
  let regs     = tempRegistros;
  if (q)               regs = regs.filter(r => r.unidad_nombre.toLowerCase().includes(q) || r.responsable.toLowerCase().includes(q));
  if (filtro==='alertas') regs = regs.filter(r => r.alerta);
  if (filtro==='ok')      regs = regs.filter(r => !r.alerta);
  const rows = regs.map(r => tempRenderRow(r)).join('');
  const tbody = document.getElementById('temp-tbody');
  if(tbody) tbody.innerHTML = rows || '<tr><td colspan="9" class="empty">Sin registros</td></tr>';
}

// ── NUEVO REGISTRO (modal completo) ───────────────────────
function tempNuevoRegistro() {
  if (!tempUnidades.length) { toast('Primero agregá una unidad de frío', 'error'); return; }
  const hoy   = new Date().toISOString().slice(0,10);
  const ahora = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
  const optsUnidades = tempUnidades.map(u =>
    `<option value="${u.id}" data-tipo="${u.tipo}" data-centrales="${parseInt(u.centrales)||1}">${u.nombre} (${TEMP_NOMBRES[u.tipo]})</option>`
  ).join('');

  document.getElementById('temp-modal-body').innerHTML = `
    <div class="temp-modal-title">
      <span>🌡️ Registrar Temperatura</span>
      <button class="temp-close" onclick="tempCloseModal()">✕</button>
    </div>
    <div class="temp-field"><label>Unidad de frío</label>
      <select class="temp-input" id="tr-unidad" onchange="tempRenderInputsCentrales()">${optsUnidades}</select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="temp-field"><label>Fecha</label><input class="temp-input" id="tr-fecha" type="date" value="${hoy}"/></div>
      <div class="temp-field"><label>Hora</label><input class="temp-input" id="tr-hora" type="time" value="${ahora}"/></div>
    </div>
    <div id="tr-temps-wrap"></div>
    <div class="temp-field"><label>Responsable</label>
      <input class="temp-input" id="tr-responsable" placeholder="Nombre del responsable"/>
    </div>
    <div class="temp-field"><label>Observaciones (opcional)</label>
      <input class="temp-input" id="tr-obs" placeholder="Notas adicionales..."/>
    </div>
    <div id="tr-alerta-msg" style="display:none;background:rgba(239,68,68,.1);border:1px solid #ef4444;border-radius:8px;padding:10px;font-size:13px;color:#ef4444;margin-top:8px">
      ⚠️ Temperatura fuera del rango permitido para este tipo de unidad
    </div>
    <div class="temp-modal-actions">
      <button class="temp-btn primary" onclick="tempGuardarRegistro()">Guardar</button>
      <button class="temp-btn secondary" onclick="tempCloseModal()">Cancelar</button>
    </div>`;

  tempRenderInputsCentrales();

  document.getElementById('temp-modal').classList.add('open');
}

// Renderiza los inputs de temperatura según las centrales de la unidad seleccionada
function tempRenderInputsCentrales() {
  const sel  = document.getElementById('tr-unidad');
  const wrap = document.getElementById('tr-temps-wrap');
  if (!sel || !wrap) return;
  const opt   = sel.options[sel.selectedIndex];
  const nCent = parseInt(opt?.dataset.centrales) || 1;
  const tipo  = opt?.dataset.tipo || '';
  wrap.innerHTML = Array.from({length: nCent}, (_,i) => `
    <div class="temp-field"><label>${nCent > 1 ? `Central ${i+1} (°C)` : 'Temperatura (°C)'}</label>
      <input class="temp-input" id="tr-temp-${i+1}" type="number" step="0.1" placeholder="Ej: -20.5"/>
    </div>`).join('');
  for (let i = 1; i <= nCent; i++) {
    document.getElementById('tr-temp-' + i).addEventListener('input', function() {
      const alertaEl = document.getElementById('tr-alerta-msg');
      if (!alertaEl) return;
      let hayAlerta = false;
      for (let j = 1; j <= nCent; j++) {
        const t = parseFloat(document.getElementById('tr-temp-' + j)?.value);
        if (!isNaN(t) && tempEsAlerta(t, tipo)) hayAlerta = true;
      }
      alertaEl.style.display = hayAlerta ? 'block' : 'none';
    });
  }
}

  }

  if (!fecha || !hora || !lecturas.length || !responsable) {

function tempPedirClave(accion) {
  return new Promise(resolve => {
    // Mini modal de clave
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9000;display:flex;align-items:center;justify-content:center';
    overlay.innerHTML = `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;width:340px;max-width:95vw">
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;font-family:'Syne',sans-serif">🔐 Clave requerida</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:16px">Ingresá la clave para ${accion}</div>
        <input id="_clave_input" type="password" class="temp-input" placeholder="Clave..." style="margin-bottom:12px"/>
        <div id="_clave_err" style="display:none;color:#ef4444;font-size:12px;margin-bottom:10px">❌ Clave incorrecta</div>
        <div style="display:flex;gap:10px">
          <button class="temp-btn primary" id="_clave_ok" style="flex:1">Confirmar</button>
          <button class="temp-btn secondary" id="_clave_cancel">Cancelar</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#_clave_input');
    inp.focus();
    overlay.querySelector('#_clave_ok').onclick = () => {
      if (inp.value === CLAVE_REGISTROS) { overlay.remove(); resolve(true); }
      else { overlay.querySelector('#_clave_err').style.display = 'block'; inp.value = ''; inp.focus(); }
    };
    overlay.querySelector('#_clave_cancel').onclick = () => { overlay.remove(); resolve(false); };
    inp.addEventListener('keydown', e => { if(e.key === 'Enter') overlay.querySelector('#_clave_ok').click(); });
  });
}

    tempVerUnidad(_unidadActiva);

async function tempGuardarEdicion(id, tipo) {
  const fecha       = document.getElementById('te-fecha').value;
  const hora        = document.getElementById('te-hora').value;
  const central     = parseInt(document.getElementById('te-central').value) || 1;
  const temp        = parseFloat(document.getElementById('te-temp').value);
  const responsable = document.getElementById('te-responsable').value.trim();
  const obs         = document.getElementById('te-obs').value.trim();
  if (!fecha || !hora || isNaN(temp) || !responsable) { toast('Completá todos los campos', 'error'); return; }
  const esAlerta = tempEsAlerta(temp, tipo);
  try {
    await api(`temp_registros?id=eq.${id}`, 'PATCH', { fecha, hora, central, temperatura: temp, responsable, observaciones: obs, alerta: esAlerta });
    toast('✅ Registro actualizado');
    await tempLoadData();
    if (_unidadActiva) {
      tempVerUnidad(_unidadActiva);
    } else {
      tempCloseModal();
    }
    _unidadActiva = null;
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function tempEliminarRegistro(id, unidadId) {
  const ok = await tempPedirClave('eliminar el registro');
  if (!ok) return;
  if (!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
  try {
    await api(`temp_registros?id=eq.${id}`, 'DELETE');
    toast('🗑️ Registro eliminado');
    await tempLoadData();
    if (unidadId) {
      tempVerUnidad(unidadId);
    }
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ── AGREGAR CENTRAL (solo incrementa, nunca borra) ────────
async function tempAgregarCentral(id) {
  const u = tempUnidades.find(x => x.id === id);
  if (!u) return;
  const actual = parseInt(u.centrales) || 1;
  if (actual >= 6) { toast('Esta unidad ya tiene el máximo de 6 centrales', 'error'); return; }
  const nuevo = actual + 1;
  if (!confirm(`¿Agregar la Central ${nuevo} a "${u.nombre}"? Esta acción no se puede deshacer.`)) return;
  try {
    await api(`temp_unidades?id=eq.${id}`, 'PATCH', { centrales: nuevo });
    toast(`✅ Central ${nuevo} agregada`);
    await tempLoadData();
    tempVerUnidad(id);
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

    await api(`temp_unidades?id=eq.${id}`, 'PATCH', { activo: false });

    tempCloseModal();

}

  const rows    = tempRegistros.map(r => [
    r.fecha, r.hora, r.unidad_nombre, TEMP_NOMBRES[r.tipo] || r.tipo,
    'C' + (r.central || 1), r.temperatura, r.responsable, r.observaciones || '', r.alerta ? 'ALERTA' : 'Normal'
  ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
  const csv  = bom + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `temperaturas_${clienteId?.slice(0,8) || 'cliente'}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('✅ Archivo descargado — abrilo con Excel');
}

// ── ANÁLISIS IA ───────────────────────────────────────────
async function tempAnalisisIA() {
  const wrap = document.querySelector('.temp-wrap');
  if (!wrap) return;

  let panel = document.getElementById('temp-ai-panel');
  if (!panel) {
    panel = document.createElement('div');
    panel.className = 'temp-ai-panel';
    panel.id = 'temp-ai-panel';
    panel.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700;color:#8b5cf6">🤖 Análisis IA — Temperaturas</div>
        <button class="temp-btn secondary" style="padding:4px 10px;font-size:11px" onclick="this.parentElement.parentElement.remove()">✕</button>
      </div>
      <div class="temp-ai-loading" id="temp-ai-loading"><div class="mant-spinner"></div> Analizando registros...</div>
      <div class="temp-ai-response" id="temp-ai-response" style="display:none"></div>`;
    wrap.appendChild(panel);
  } else {
    panel.querySelector('#temp-ai-loading').style.display = 'flex';
    panel.querySelector('#temp-ai-response').style.display = 'none';
  }

  const hoy          = new Date().toISOString().slice(0,10);
  const alertasTotal = tempRegistros.filter(r => r.alerta).length;
  const alertasHoy   = tempRegistros.filter(r => r.alerta && r.fecha === hoy).length;
  const porUnidad    = tempUnidades.map(u => {
    const regs    = tempRegistros.filter(r => r.unidad_id === u.id);
    const alertas = regs.filter(r => r.alerta).length;
    const temps   = regs.map(r => parseFloat(r.temperatura)).filter(t => !isNaN(t));
    const promedio = temps.length ? (temps.reduce((a,b) => a+b, 0) / temps.length).toFixed(1) : null;
    const ultima  = regs[0];
    return { nombre: u.nombre, tipo: u.tipo, total: regs.length, alertas, promedio, ultima_temp: ultima?.temperatura };
  });

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1000,
        messages: [{ role: 'user', content:
          `Sos un experto en inocuidad alimentaria y control de cadena de frío. Analizá los siguientes datos de temperaturas y generá un informe ejecutivo en español con:\n1. **Estado actual de la cadena de frío**\n2. **Alertas críticas** (unidades fuera de rango)\n3. **Tendencias** (unidades con más alertas históricas)\n4. **Recomendaciones correctivas inmediatas**\n5. **Proyección de riesgos** si continúan las tendencias\n\nLímites normativos: Heladera/Cámara frigorífica ≤5°C, Cámara verduras ≤8°C, Freezer ≤-18°C\n\nDatos:\n- Total registros: ${tempRegistros.length}\n- Alertas totales: ${alertasTotal}\n- Alertas hoy: ${alertasHoy}\n- Por unidad: ${JSON.stringify(porUnidad, null, 2)}\n\nSé concreto, usa bullet points, máximo 400 palabras.`
        }]
      })
    });
    const data  = await resp.json();
    const texto = data.content?.[0]?.text || 'No se pudo generar el análisis.';
    panel.querySelector('#temp-ai-loading').style.display = 'none';
    const respEl = panel.querySelector('#temp-ai-response');
    respEl.style.display = 'block';
    respEl.textContent   = texto;
  } catch(e) {
    panel.querySelector('#temp-ai-loading').style.display = 'none';
    const respEl = panel.querySelector('#temp-ai-response');
    respEl.style.display = 'block';
    respEl.textContent   = 'Error al conectar con la IA: ' + e.message;
  }
}

  if(m) m.classList.remove('open');
